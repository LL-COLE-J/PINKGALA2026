<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="data:,">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<title>Pink Gala Check-In</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  padding:20px;
  text-align:center;
  background:linear-gradient(135deg,#fff0f6,#ffe3ec);
}

.matchButton {
  background: linear-gradient(135deg, #d63384, #ff4da6);
  color: white;
  margin: 10px auto;
  padding: 18px;
  border-radius: 12px;
  max-width: 420px;
  font-size: 22px;
  font-weight: 600;
  box-shadow: 0 10px 25px rgba(214,51,132,0.35);
  border: none;
  cursor: pointer;
  transition: all 0.15s ease;
}

.matchButton:hover {
  transform: scale(1.03);
  box-shadow: 0 14px 30px rgba(214,51,132,0.5);
}

.matchButton:active {
  transform: scale(0.97);
}

.mainCard{
  background:white;
  padding:30px;
  border-radius:16px;
  max-width:500px;
  margin:auto;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

h1{ color:#d63384; }

.tableCard{
  margin-top:30px;
  padding:50px 20px;
  background:linear-gradient(135deg,#d63384,#ff66a3);
  color:white;
  border-radius:18px;
}

.tableNumber{ font-size:120px; }
.bidderNumber{ font-size:32px; }
.welcomeName{ font-size:28px; }

input{
  padding:20px;
  font-size:24px;
  width:100%;
  max-width:420px;
  border-radius:10px;
  box-sizing:border-box;
  margin:0 auto;
  display:block;
}

button{
  margin-top:15px;
  padding:18px;
  font-size:22px;
  width:100%;
  background:#d63384;
  color:white;
  border:none;
  border-radius:10px;
}

#status{
  margin-top:15px;
  font-size:18px;
  font-weight:600;
  color:#d63384;
}
</style>
</head>

<body>

<div class="mainCard">

<div style="font-size:60px;margin-bottom:10px;color:#d63384;">🎗️</div>

<h1>2026 Pink Gala Check-In</h1>

<input id="searchInput" placeholder="Search guest..." />

<div id="guestList"></div>

<div id="loading">Loading guest list...</div>
<div id="status"></div>

</div>

<script src="guests.js"></script>

<script>

// ✅ YOUR LIVE WEB APP URL
const SCRIPT_URL = "https://mute-fog-a9af.llcolej8.workers.dev";

let guestList = [];
const guestMap = {};
const checkedInSet = new Set();

/* LOAD */
function loadGuests() {
  guestList = GUESTS.map((g,i)=>({
    id:String(g.id||i),
    name:g.name,
    bidder:g.bidder,
    table:g.table
  }));

  guestList.forEach(g=>guestMap[g.id]=g);

  document.getElementById("loading").style.display="none";
  document.getElementById("status").innerText="Start typing name";
}

/* SEARCH */
function handleSearch(e){
  const term=e.target.value.toLowerCase().trim();
  const container=document.getElementById("guestList");
  container.innerHTML="";

  if(!term) return;

  const results=guestList
    .filter(g=>g.name.toLowerCase().includes(term))
    .slice(0,10);

  results.forEach(g=>{
    const div=document.createElement("div");
    div.className="matchButton";
    div.innerText=g.name;
    div.onclick=()=>handleCheckIn(g.id);
    container.appendChild(div);
  });

  document.getElementById("status").innerText=`${results.length} match(es)`;
}

/* CHECK-IN (FIXED + BACKEND MATCHED) */
function handleCheckIn(id){

  if(checkedInSet.has(id)) return;
  checkedInSet.add(id);

  // ✅ HARD FIX: fallback lookup (prevents undefined guest)
  let guest = guestMap[id];

  if (!guest) {
    guest = guestList.find(g => String(g.id) === String(id));
  }

  if (!guest) {
    console.error("Guest lookup failed:", id);
    return;
  }

  // ✅ BACKEND CALL (UNCHANGED LOGIC)
  fetch(`${SCRIPT_URL}?ids=${encodeURIComponent(JSON.stringify([id]))}`)
    .then(res => res.text())
    .then(res => console.log("CHECK-IN RESPONSE:", res))
    .catch(err => console.error("CHECK-IN ERROR:", err));

  // ✅ UI (RESTORED)
  document.getElementById("guestList").innerHTML=`
    <div class="tableCard">
      <div class="welcomeName">${guest.name}</div>
      <div class="tableNumber">${guest.table||"-"}</div>
      <div class="bidderNumber">Bidder #${guest.bidder||"-"}</div>

      <div style="margin-top:15px;font-size:20px;">
        ✅ Checked In
      </div>

      <button onclick="enterAuction('${guest.name}','${guest.bidder}','${guest.table}')">
        Enter Auction Starting Bid
      </button>
    </div>
  `;

  confetti({particleCount:60,spread:70,origin:{y:0.6}});
}
/* NAVIGATE TO AUCTION */
function enterAuction(name,bidder,table){
  window.location.href=`auctionNEW.html?name=${encodeURIComponent(name)}&bidder=${bidder}&table=${table}`;
}

/* INIT */
window.onload=()=>{
  loadGuests();
  document.getElementById("searchInput").addEventListener("input",handleSearch);
};

</script>

</body>
</html>
