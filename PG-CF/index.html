<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="data:,">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pink Gala Check-In</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #00ff9c;
}

#searchInput {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  margin-top: 20px;
  border-radius: 10px;
  border: none;
}

.matchButton {
  background: #111;
  border: 1px solid #00ff9c;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.matchButton:hover {
  background: #00ff9c;
  color: #000;
}

.tableCard {
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  background: #111;
  text-align: center;
}

.welcomeName {
  font-size: 28px;
  margin-bottom: 10px;
}

.tableNumber {
  font-size: 22px;
}

.bidderNumber {
  font-size: 18px;
  margin-top: 10px;
}

button {
  margin-top: 20px;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #00ff9c;
  color: #000;
  cursor: pointer;
}

#status {
  margin-top: 10px;
  color: #aaa;
}
</style>
</head>

<body>

<h1>Guest Check-In</h1>

<input id="searchInput" placeholder="Search guest name..." />

<div id="status">Loading guests...</div>
<div id="loading">Loading...</div>

<div id="guestList"></div>

<script>

// 🔥 YOUR GAS URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

let guestList = [];
const guestMap = {};
const checkedInSet = new Set();

// 🔥 QUEUE SYSTEM
let queue = [];
let timer = null;

/* LOAD GUESTS FROM GAS */
function loadGuests() {

  fetch(SCRIPT_URL + "?guests=1")
    .then(res => res.json())
    .then(data => {

      guestList = data.map((g,i)=>({
        id:String(g.id ?? (i + 1)),
        name:g.name || "",
        bidder:g.bidder || "",
        table:g.table || ""
      }));

      guestList.forEach(g=>guestMap[g.id]=g);

      document.getElementById("loading").style.display="none";
      document.getElementById("status").innerText="Start typing name";

    })
    .catch(err => {
      console.error("Guest load failed", err);
      document.getElementById("status").innerText="Error loading guests";
    });
}

/* SEARCH */
function handleSearch(e){
  const term=e.target.value.toLowerCase().trim();
  const container=document.getElementById("guestList");
  container.innerHTML="";

  if(!term) return;

  const results=guestList
    .filter(g=>g.name.toLowerCase().includes(term))
    .slice(0,10);

  results.forEach(g=>{
    const div=document.createElement("div");
    div.className="matchButton";
    div.innerText=g.name;
    div.onclick=()=>handleCheckIn(g.id);
    container.appendChild(div);
  });

  document.getElementById("status").innerText=`${results.length} match(es)`;
}

/* CHECK-IN */
function handleCheckIn(id){

  if(checkedInSet.has(id)) return;
  checkedInSet.add(id);

  const guest = guestMap[id];
  if (!guest) return;

  document.getElementById("guestList").innerHTML=`
    <div class="tableCard">
      <div class="welcomeName">${guest.name}</div>
      <div class="tableNumber">Table: ${guest.table||"-"}</div>
      <div class="bidderNumber">Bidder #${guest.bidder||"-"}</div>

      <div style="margin-top:15px;font-size:20px;">
        ✅ Checked In
      </div>

      <button onclick='enterAuction(${JSON.stringify(guest.name)}, ${JSON.stringify(guest.bidder)}, ${JSON.stringify(guest.table)})'>
        Enter Auction Starting Bid
      </button>
    </div>
  `;

  confetti({particleCount:60,spread:70,origin:{y:0.6}});

  // 🔥 QUEUE
  queue.push(id);

  if (queue.length >= 20) sendBatch();

  if (!timer) {
    timer = setTimeout(sendBatch, 400);
  }
}

/* SEND TO GAS */
function sendBatch() {

  if (queue.length === 0) return;

  const batch = [...queue];
  queue = [];

  if (timer) {
    clearTimeout(timer);
    timer = null;
  }

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: new URLSearchParams({
      ids: JSON.stringify(batch)
    })
  });

  console.log("BATCH SENT:", batch.length);
}

/* NAVIGATION */
function enterAuction(name,bidder,table){
  window.location.href=`auctionNEW.html?name=${encodeURIComponent(name)}&bidder=${bidder}&table=${table}`;
}

/* INIT */
window.onload=()=>{
  loadGuests();
  document.getElementById("searchInput").addEventListener("input",handleSearch);
};

</script>

</body>
</html>
