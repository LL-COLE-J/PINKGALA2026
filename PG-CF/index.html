<script>

// ✅ DIRECT GAS URL (NOT WORKER)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

let guestList = [];
const guestMap = {};
const checkedInSet = new Set();

// 🔥 QUEUE SYSTEM
let queue = [];
let timer = null;

/* LOAD */
function loadGuests() {
  guestList = GUESTS.map((g,i)=>({
    id:String(g.id ?? (i + 1)),
    name:g.name,
    bidder:g.bidder,
    table:g.table
  }));

  guestList.forEach(g=>guestMap[g.id]=g);

  document.getElementById("loading").style.display="none";
  document.getElementById("status").innerText="Start typing name";
}

/* SEARCH */
function handleSearch(e){
  const term=e.target.value.toLowerCase().trim();
  const container=document.getElementById("guestList");
  container.innerHTML="";

  if(!term) return;

  const results=guestList
    .filter(g=>g.name.toLowerCase().includes(term))
    .slice(0,10);

  results.forEach(g=>{
    const div=document.createElement("div");
    div.className="matchButton";
    div.innerText=g.name;
    div.onclick=()=>handleCheckIn(g.id);
    container.appendChild(div);
  });

  document.getElementById("status").innerText=`${results.length} match(es)`;
}

/* CHECK-IN */
function handleCheckIn(id){

  if(checkedInSet.has(id)) return;
  checkedInSet.add(id);

  const guest = guestMap[id];
  if (!guest) return;

  // ✅ INSTANT UI
  document.getElementById("guestList").innerHTML=`
    <div class="tableCard">
      <div class="welcomeName">${guest.name}</div>
      <div class="tableNumber">${guest.table||"-"}</div>
      <div class="bidderNumber">Bidder #${guest.bidder||"-"}</div>

      <div style="margin-top:15px;font-size:20px;">
        ✅ Checked In
      </div>

      <button onclick='enterAuction(${JSON.stringify(guest.name)}, ${JSON.stringify(guest.bidder)}, ${JSON.stringify(guest.table)})'>
        Enter Auction Starting Bid
      </button>
    </div>
  `;

  confetti({particleCount:60,spread:70,origin:{y:0.6}});

  // 🔥 QUEUE
  queue.push(id);

  if (queue.length >= 20) sendBatch();

  if (!timer) {
    timer = setTimeout(sendBatch, 400);
  }
}

/* SEND */
function sendBatch() {

  if (queue.length === 0) return;

  const batch = [...queue];
  queue = [];

  if (timer) {
    clearTimeout(timer);
    timer = null;
  }

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors", // 🔥 CORS FIX
    body: new URLSearchParams({
      ids: JSON.stringify(batch)
    })
  });

  console.log("BATCH SENT:", batch.length);
}

/* NAV */
function enterAuction(name,bidder,table){
  window.location.href=`auctionNEW.html?name=${encodeURIComponent(name)}&bidder=${bidder}&table=${table}`;
}

/* INIT */
window.onload=()=>{
  loadGuests();
  document.getElementById("searchInput").addEventListener("input",handleSearch);
};

</script>
