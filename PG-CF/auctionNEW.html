<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>2026 Pink Gala Auction</title>

<style>

  html {
  font-size: 120%;
}
#auctionItems {
  display: flex;
  flex-direction: column;
  gap: 28px; /* ~quarter inch spacing */
}
  .bid-box {
  background: rgba(255,255,255,0.25);
  padding: 20px;
  border-radius: 14px;
  margin: 16px 0;
}

.bid-amount {
  font-size: 100px;
  font-weight: 800;
  margin-bottom: 10px;
}

.bid-meta {
  font-size: 32px;
  margin-bottom: 6px;
}

.bid-next {
  font-size: 30px;
  opacity: 1;
}

.bid-item {
  width: 100%;
   max-width: 420px;
  text-align: center;
  margin: 0 auto 24px auto;
  border-radius: 18px;
  padding: 28px 20px;
  margin-bottom: 24px;
  background: linear-gradient(135deg, #d63384, #ff6fa3);
  color: white;
  font-size: 20px;
}

.submenu {
  text-align: center;
  margin-bottom: 20px;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom right, #ffe6f0, #fff);
  margin: 0;
  padding: 6px;
}

h1 {
  color: #d63384;
  text-align: center;
}

  .top-actions {
  max-width: 420px;
  margin: 0 auto 20px auto;
  padding: 0 10px; /* 🔥 pulls in from edges */
  text-align: center;
}

  .top-actions button {
  width: 100%;
  border-radius: 4px;
}

  .custom-bid-box {
  margin-top: 10px;
  margin-bottom: 14px;
  padding: 14px;
  border-radius: 18px;
  border: 2px dashed rgba(214,51,132,0.4);
  background: rgba(255,255,255,0.95);
}


.bid-item.winning {
  background: #e8f7ee;
  color: black;
  border: 3px solid #28a745;
  box-shadow: 0 0 0 4px rgba(40,167,69,0.15);
}

  .app-body {
  width: 100%;
  max-width: 100%;
  margin: 0 auto;
  padding: 0 4px 40px 4px;
}

button {
  background: #d63384;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 28px;
  font-size: 36px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
  margin-top: 10px;
}

input {
  padding: 20px;
  font-size: 30px;
  border-radius: 14px;
  border: 2px solid #d63384;
background: rgba(255,255,255,0.9);
color: #333;
  width: 100%;
  text-align: center;
  font-weight: 700;
  min-height: 75px;
  box-sizing: border-box;
}

.winning div:first-child {
  font-size: 16px;
}

.bid-item img {
  transition: transform 0.2s ease;
}

.bid-item:hover img {
  transform: scale(1.03);
}

   .item-title {
  font-size: 44px;
  font-weight: 800;
  margin: 16px 0 20px 0;
  line-height: 1.2;
}
    .loading-state {
  text-align: center;
  font-size: 32px;
  font-weight: 700;
  padding: 80px 20px;
  color: #d63384;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}


  @media (max-width: 430px) {

  body {
    margin: 0 !important;
    padding: 6px !important;
    max-width: 100% !important;
  }

  #auctionPage {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 !important;
  }

  #auctionItems {
    width: 100% !important;
  }

  .bid-item {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 18px !important;
    border-radius: 16px;
  }

  /* Make buttons fill properly */
  .bid-item button {
    width: 100%;
  }

  

  
}

</style>
</head>

<body>

<h1>2026 Pink Gala Auction</h1>
  <div class="app-body">


<div class="top-actions">

  <button onclick="goHome()" style="display:block; margin:0 auto 10px auto;">
    🏠 Home
  </button>

  <button onclick="toggleMyBids()" id="myBidsBtn" style="display:block; margin:0 auto;">
    🎯 My Bids
  </button>

</div>


<div id="auctionPage">

  <!-- USER BAR (NEW) -->
  <div style="width:100%; margin:0 0 20px 0; text-align:center;">
  <strong id="userInfo"></strong>
</div>

  <!-- AUCTION ITEMS -->
  <div id="auctionItems">
  <div class="loading-state">
  ⏳ Loading auction items...
</div>
</div>


<script>

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjcBzFLO9XFpkWhbTLaRdG4DqpAbrvmnEPc9EwwG6eTwfG73UTQGZD2-U10aeUCV-6/exec";

  let interactionTimeout;

console.log("AUCTION VERSION 2");

let currentItems = [];
let isInteracting = false;
let previousWinners = {};
  let showMyBidsOnly = false;

// ===== USER FROM CHECK-IN =====
const params = new URLSearchParams(window.location.search);

const rawName = params.get("name") || "";

const cleanName = decodeURIComponent(rawName).replace(/\+/g, " ");

const user = {
  name: cleanName || "Bidder " + params.get("bidder"),
  bidderId: params.get("bidder"),
  table: params.get("table")
};


function toggleMyBids() {
  showMyBidsOnly = !showMyBidsOnly;

  const btn = document.getElementById("myBidsBtn");
  if (btn) {
    btn.style.background = showMyBidsOnly ? "#28a745" : "#d63384";
  }

  renderItems(currentItems);
}
  

// ===== RENDER ITEMS (FIXED) =====
function renderItems(items) {

  const div = document.getElementById("auctionItems");

  if (!div) return;

  if (!items || items.length === 0) {
    div.innerHTML = "<p>No items available</p>";
    return;
  }

  div.innerHTML = "";

  let filteredItems = items
    .filter(i => i && (i.name || i.ItemName))
    .filter(i => {
      const status = (i.status || "")
        .toString()
        .trim()
        .toLowerCase();
      return status === "open" || status === "";
    });

  // 🎯 MY BIDS FILTER
  if (showMyBidsOnly) {
    filteredItems = filteredItems.filter(i =>
      String(i.current_winner) === String(currentBidder)
    );
  }

  filteredItems
    .sort((a, b) => (parseFloat(b.current_bid) || 0) - (parseFloat(a.current_bid) || 0))
    .forEach(item => {

      const id = item.item_id || item.ItemID;
      const name = item.name || item.ItemName;
     const startingBid = parseFloat(item.starting_bid || item.StartingBid) || 0;
const currentBidRaw = parseFloat(item.current_bid);

const effectiveBid = (!isNaN(currentBidRaw) && currentBidRaw > 0)
  ? currentBidRaw
  : startingBid;
      const winner = item.current_winner || "-";
      const image = item.image || "";

const increment = parseFloat(item.bid_increment) || 50;
const nextBid = effectiveBid + increment;
      const isWinning = String(item.current_winner) === String(currentBidder);

      const card = document.createElement("div");
      card.className = "bid-item";

      if (isWinning) {
        card.classList.add("winning");
      }

      card.innerHTML = `
        ${isWinning ? `
          <div style="font-weight:bold; color:#155724; font-size:22px; margin-bottom:12px;">
            🏆 YOU ARE WINNING
          </div>
        ` : ""}

        ${image ? `
          <img src="${image}" 
            onerror="this.style.display='none';"
            style="width:100%; height:220px; object-fit:cover; border-radius:10px; margin-bottom:10px;">
        ` : ""}

        <div class="item-title">
          ${name}
        </div>

     

       <div class="bid-box">

  <div class="bid-amount">
    $${effectiveBid}
  </div>

  <div class="bid-meta">
    Leader: ${winner}
  </div>

  <div class="bid-next">
    Next Bid: $${nextBid}
  </div>

</div>
        <button 
  onclick="placeQuickBid('${id}', ${nextBid}, this)"
  style="background:#28a745; font-size:28px; padding:26px; margin-top:16px;"
>
          Bid $${nextBid}
        </button>

       <div class="custom-bid-box" onclick="focusBidInput('${id}')">

  <div style="font-size:20px; font-weight:700; margin-bottom:8px; color:#d63384;">
    Enter Custom Bid
  </div>

  <input 
  id="input-${id}" 
  type="text" 
  inputmode="numeric"
  placeholder="Custom bid"
  onfocus="startInteraction()" 
  oninput="startInteraction()"
  onkeydown="handleBidEnter(event, '${id}', this)"
>
  
  <button onclick="placeCustomBid('${id}', this)" 
    style="font-size:22px; padding:18px;">
    Submit Bid
  </button>

</div>

  
        

        <div id="status-${id}" style="margin-top:8px;"></div>
      `;

      div.appendChild(card);
    });
}



let currentGuest = user.name;
console.log("CURRENT GUEST VALUE:", currentGuest);
let currentBidder = user.bidderId;
let currentTable = user.table;

async function placeCustomBid(id, btn){

  if (btn.disabled) return;
  btn.disabled = true;

  const statusEl = document.getElementById(`status-${id}`);
  statusEl.innerText = "Submitting...";

  const inputEl = document.getElementById(`input-${id}`);
  const val = Number(inputEl.value);

  if(!val){
    btn.disabled = false;
    return alert("Enter bid");
  }

  let item = currentItems.find(i => i.item_id == id);
  const current = Number(item?.current_bid) || 0;

  if (val <= current) {
    btn.disabled = false;
    return alert(`Bid must be greater than $${current}`);
  }

  try {
console.log("FULL PAYLOAD:", {
  bidder_name: currentGuest,
  bidder_id: currentBidder
});

   const res = await fetch(SCRIPT_URL, {
  method: "POST",
  body: new URLSearchParams({
    bid: true,
    item_id: id,
    bidder_id: currentBidder,
    bidder_name: currentGuest,
    amount: val
  })
});

const result = await res.json();

if (result.success === true) {
  statusEl.innerHTML = "<span style='color:lightgreen;'>Bid placed</span>";
} else {
  statusEl.innerHTML = `<span style='color:red;'>${result.message || "Outbid"}</span>`;
}
    
    inputEl.value = "";

  } catch (err) {
    statusEl.innerText = "⚠️ Error";
    console.error(err);
  }

  btn.disabled = false;
  fetchItems();
}

  function startInteraction() {
  isInteracting = true;

  if (interactionTimeout) {
    clearTimeout(interactionTimeout);
  }

  interactionTimeout = setTimeout(() => {
    isInteracting = false;
  }, 10000);
}

function endInteraction() {
  if (interactionTimeout) {
    clearTimeout(interactionTimeout);
  }

  interactionTimeout = setTimeout(() => {
    isInteracting = false;
  }, 10000);
}




// ===== FETCH ITEMS =====
async function fetchItems(){

  const res = await fetch(`${SCRIPT_URL}?items=true`);

  const text = await res.text(); // 👈 important
  console.log("RAW:", text);

  let data;
  try {
    data = JSON.parse(text);
  } catch (e) {
    console.error("JSON parse failed:", e);
    return;
  }

  console.log("PARSED:", data);

  currentItems = data;
  localStorage.setItem("auctionItems", JSON.stringify(currentItems));

  console.log("FINAL ITEMS:", currentItems);

  renderItems(currentItems);
}

  function focusBidInput(id) {
  const el = document.getElementById(`input-${id}`);
  if (el) {
    el.focus();
    el.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}

// ===== BID =====
async function placeQuickBid(id, amt, btn){

  if (btn.disabled) return;

  const statusEl = document.getElementById(`status-${id}`);
  btn.disabled = true;

  statusEl.innerText = "Submitting...";

  try {

    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams({
        bid: true,
        item_id: id,
        bidder_id: currentBidder,
        bidder_name: currentGuest,
        amount: amt
      })
    });

    const result = await res.json();

    if (result.success === true) {
      statusEl.innerHTML = "<span style='color:lightgreen;'>Bid placed</span>";
    } else {
      statusEl.innerHTML = `<span style='color:red;'>${result.message || "Outbid"}</span>`;
    }

  } catch (err) {
    statusEl.innerText = "⚠️ Error";
    console.error(err);
  }

  btn.disabled = false;

  fetchItems();
}

    
  document.addEventListener("DOMContentLoaded", () => {

  // 1. Load cached items instantly
  const cached = localStorage.getItem("auctionItems");
  if (cached) {
    try {
      renderItems(JSON.parse(cached));
    } catch {}
  }

  // 2. Fetch fresh data immediately
  fetchItems();

  // 3. Show user info
  document.getElementById("userInfo").innerText =
    `${user.name} | Bidder #${user.bidderId} | Table ${user.table}`;

  // 4. Auto refresh every 3 seconds
  setInterval(() => {
    if (!isInteracting) {
      fetchItems();
    }
  }, 3000);

});

  function handleBidEnter(e, id, inputEl) {
  if (e.key === "Enter") {
    e.preventDefault();

    // 🔥 CLOSE KEYBOARD
    inputEl.blur();
    document.activeElement.blur();
    
    // find the submit button in the same card
    const card = inputEl.closest(".custom-bid-box");
    const btn = card.querySelector("button");

    if (btn) {
      placeCustomBid(id, btn);
    }
  }
}

</script>
</div>
</body>
</html>
