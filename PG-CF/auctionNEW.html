<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>2026 Pink Gala Auction</title>

<style>

/* ===== BASE ===== */
html { font-size: 120%; }

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1c22, #0b0c10);
  margin: 0;
  padding: 0;
  color: #e6e8ec;
}

h1 {
  color: #d63384;
  text-align: center;
}

.app-body { padding: 0 10px 40px 10px; }

#auctionItems {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.top-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.top-actions button {
  flex: 1;
  background: linear-gradient(145deg, #2a2d36, #1c1f26);
  color: #e6e8ec;
  border: 1px solid rgba(255,255,255,0.15);
}

.bid-item {
  border-radius: 20px;
  background: linear-gradient(145deg, #1e2128, #14161b);
  box-shadow:
    0 18px 40px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 0 0 1px rgba(255,255,255,0.06);
  overflow: hidden;
}

.bid-item.winning {
  border: 2px solid #4cd964;
}

.item-title {
  font-size: 40px;
  font-weight: 800;
}

.bid-amount {
  font-size: 100px;
  font-weight: 900;
}

.bid-meta { font-size: 26px; }

button {
  border: none;
  border-radius: 14px;
  padding: 22px;
  font-size: 30px;
  font-weight: bold;
  width: 100%;
  cursor: pointer;
}

.bid-btn {
  background: linear-gradient(135deg, #5efc82, #38d96b);
  color: #000;
}

.custom-bid-box {
  margin-top: 14px;
  padding: 16px;
  border-radius: 16px;
  background: linear-gradient(145deg, #2a2d36, #1c1f26);
  border: 1px solid rgba(255,255,255,0.15);
}

input {
  padding: 18px;
  font-size: 26px;
  width: 100%;
  margin-bottom: 10px;
  background: #ffffff;
  color: #000;
  border-radius: 12px;
  border: 2px solid #cfd3dc;
  font-weight: 800;
}

.custom-bid-box button {
  background: linear-gradient(135deg, #cfd3dc, #9aa3b2);
  color: #000;
}

</style>
</head>

<body>

<h1>2026 Pink Gala Auction</h1>

<div class="app-body">

<div class="top-actions">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="toggleMyBids()" id="myBidsBtn">🎯 My Bids</button>
</div>

<div style="text-align:center; margin-bottom:20px;">
  <strong id="userInfo"></strong>
</div>

<div id="auctionItems">
  <div class="loading-state">⏳ Loading auction items...</div>
</div>

<script>

const params=new URLSearchParams(window.location.search);
const currentBidder=params.get("bidder")||"";
const currentGuest=params.get("name")||"";

document.getElementById("userInfo").innerText =
  currentGuest ? `${currentGuest} (Bidder #${currentBidder})` : "";

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwjcBzFLO9XFpkWhbTLaRdG4DqpAbrvmnEPc9EwwG6eTwfG73UTQGZD2-U10aeUCV-6/exec";

/* HASH GUARD */
let lastDataHash = "";

/* MY BIDS (PERSISTED) */
let myBids = new Set();

// 🔥 LOAD FROM STORAGE
const saved = localStorage.getItem("myBids");
if (saved) {
  myBids = new Set(JSON.parse(saved));
}

/* WIN STATE */
let lastWinningState = {};

/* MY BIDS TOGGLE */
let showMyBids=false;
let allItemsCache=[];

function toggleMyBids(){
  showMyBids=!showMyBids;

  document.getElementById("myBidsBtn").innerText =
    showMyBids ? "📋 All Items" : "🎯 My Bids";

  renderItems(allItemsCache);
}

/* SEND BID */
function sendBid(itemId,amount){

  if (!currentBidder) {
    alert("Missing bidder info");
    return;
  }

  fetch(SCRIPT_URL,{
    method:"POST",
    mode:"no-cors",
    body:new URLSearchParams({
      bid:"true",
      item_id:itemId,
      bidder_id:currentBidder,
      bidder_name:currentGuest,
      amount:amount
    })
  });
}

/* QUICK */
function placeQuickBid(id,amt,btn){
  btn.disabled=true;

  myBids.add(String(id));
  localStorage.setItem("myBids", JSON.stringify([...myBids]));

  sendBid(id,amt);

  setTimeout(()=>btn.disabled=false,800);
}

/* CUSTOM */
function placeCustomBid(id,currentBid){
  const val=Number(document.getElementById(`input-${id}`).value);

  if (!val || val <= 0) return alert("Enter valid bid");
  if (val <= currentBid) return alert("Bid must be higher");

  myBids.add(String(id));
  localStorage.setItem("myBids", JSON.stringify([...myBids]));

  sendBid(id,val);
}

/* FETCH */
async function fetchItems(){
  try{
    const res=await fetch(`${SCRIPT_URL}?items=true`);
    const data=await res.json();

    const newHash = JSON.stringify(data);
    if (newHash === lastDataHash) return;

    lastDataHash = newHash;

    allItemsCache=data;
    renderItems(data);
  }catch(e){
    console.error("fetch fail",e);
  }
}

/* RENDER */
function renderItems(items){

  const div=document.getElementById("auctionItems");
  div.innerHTML="";

  if(showMyBids){
    items = items.filter(item => myBids.has(String(item.item_id)));
  }

  if(items.length===0){
    div.innerHTML=`<div style="text-align:center;opacity:0.7;font-size:22px;">No bids yet</div>`;
    return;
  }

  items.forEach(item=>{

    const id=String(item.item_id);
    const bid=item.current_bid||0;
    const increment=item.bid_increment||50;

    const isWinning=item.current_winner==currentBidder;
    const isOutbid=myBids.has(id) && item.current_winner!=currentBidder;

    const prev = lastWinningState[id];
    if (prev === true && !isWinning && myBids.has(id)) {
      alert(`You were outbid on ${item.item_name}`);
    }
    lastWinningState[id] = isWinning;

    div.innerHTML+=`
      <div class="bid-item ${isWinning ? 'winning' : ''}" 
           style="${isOutbid ? 'border:2px solid #ff4d4d;' : ''}">
        <div class="item-title">${item.item_name}</div>

        <div class="bid-amount">$${bid}</div>

        <div class="bid-meta">
          Leading: ${item.current_winner || '—'}
        </div>

        ${isWinning ? '<div style="color:#4cd964;font-weight:bold;">✔ You are winning</div>' : ''}
        ${isOutbid ? '<div style="color:#ff4d4d;font-weight:bold;">❌ You have been outbid</div>' : ''}

        <button class="bid-btn"
          ${isWinning ? 'disabled' : ''}
          onclick="placeQuickBid('${id}',${bid + increment},this)">
          BID $${bid + increment}
        </button>

        <div class="custom-bid-box">
          <input id="input-${id}" placeholder="Custom Bid">
          <button onclick="placeCustomBid('${id}',${bid})">Submit</button>
        </div>
      </div>
    `;
  });
}

/* NAV */
function goHome(){
  window.location.href="checkin.html";
}

/* INIT */
fetchItems();
setInterval(fetchItems,1000);

</script>

</div>
</body>
</html>
