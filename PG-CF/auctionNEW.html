<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Auction</title>
</head>
<body>

<h2>Auction Items</h2>
<div id="items"></div>

<script>
const API = "YOUR_WEB_APP_URL";

async function loadAuction() {
  const res = await fetch(API + "?auction=true");
  const items = await res.json();

  const container = document.getElementById("items");
  container.innerHTML = "";

  items.forEach(item => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${item.name}</h3>
      <p>Current Bid: $${item.currentBid}</p>
      <input type="number" id="bid-${item.itemId}" placeholder="Enter bid"/>
      <button onclick="placeBid(${item.itemId})">Bid</button>
      <hr/>
    `;

    container.appendChild(div);
  });
}

async function placeBid(itemId) {
  const bid = document.getElementById("bid-" + itemId).value;

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      itemId: itemId,
      bid: Number(bid)
    })
  });

  const result = await res.json();

  if (result.success) {
    alert("Bid placed!");
    loadAuction();
  } else {
    alert(result.message || "Bid failed");
  }
}

loadAuction();
</script>

</body>
</html>
