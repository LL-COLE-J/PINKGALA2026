<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Auction</title>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f5f6fa;
  margin: 0;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

#items {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.item {
  background: white;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.item:hover {
  transform: translateY(-3px);
}

.item h3 {
  margin: 0 0 10px;
}

.bid {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 8px;
  margin-bottom: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #e84360;
}
</style>

</head>
<body>

<h2>Live Auction</h2>
<div id="items"></div>

<script>
const API = "https://mute-fog-a9af.llcolej8.workers.dev";

let loading = false;

// LOAD ITEMS
async function loadAuction() {
  if (loading) return;
  loading = true;

  try {
    const res = await fetch(API + "?auction=true");
    const items = await res.json();

    const container = document.getElementById("items");
    container.innerHTML = "";

    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <h3>${item.name}</h3>
        <div class="bid">$${item.currentBid}</div>
        <input type="number" id="bid-${item.itemId}" placeholder="Enter bid">
        <button onclick="placeBid('${item.itemId}')">Place Bid</button>
      `;

      container.appendChild(div);
    });

  } catch (e) {
    console.error("LOAD ERROR", e);
  }

  loading = false;
}

// PLACE BID
async function placeBid(itemId) {
  const input = document.getElementById("bid-" + itemId);
  const bid = Number(input.value);

  if (!bid) return alert("Enter valid bid");

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain"
      },
      body: JSON.stringify({
        itemId: itemId,
        bid: bid
      })
    });

    const result = await res.json();

    if (!result.success) {
      alert(result.message);
    } else {
      input.value = "";
      loadAuction();
    }

  } catch (e) {
    console.error("BID ERROR", e);
  }
}

// AUTO REFRESH
setInterval(loadAuction, 4000);

// INITIAL LOAD
loadAuction();
</script>

</body>
</html>
