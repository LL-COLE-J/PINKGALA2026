<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 Pink Gala Auction</title>

<style>
body{
  font-family: Arial;
  background:#0b0b0b;
  color:#fff;
  margin:0;
  padding:10px;
}

/* HEADER */
.header{
  text-align:center;
  color:#d63384;
  font-size:22px;
  margin-bottom:10px;
}

/* TOP BUTTONS */
.topBar{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.topBtn{
  background:#111;
  border:1px solid #00ff9c;
  color:#00ff9c;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* CARD */
.card{
  background:#111;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
  display:flex;
  gap:10px;
  border:1px solid #00ff9c;
}

.cardLeft{ flex:1; }

.cardRight img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}

.itemName{ font-size:18px; }
.price{ font-size:32px; }

.bidBtn{
  width:100%;
  padding:12px;
  background:#00ff9c;
  border:none;
  border-radius:8px;
  font-size:18px;
  margin-bottom:8px;
}

.customBox{
  text-align:center;
}

.customBox input{
  width:90%;
  padding:10px;
  margin-bottom:8px;
}

.customBox button{
  width:90%;
  padding:10px;
}

.statusWin{ color:#00ff9c; }
.statusLose{ color:#ff4d4d; }

/* MY BIDS PAGE */
#myBidsPage{
  display:none;
}

.bidItem{
  border:1px solid #00ff9c;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#00ff9c;
  padding:10px 20px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<div class="header">2026 Pink Gala Auction</div>

<div class="topBar">
  <div class="topBtn" onclick="goHome()">🏠 Home</div>
  <div class="topBtn" onclick="openMyBids()">📊 My Bids</div>
</div>

<div id="items"></div>

<!-- MY BIDS PAGE -->
<div id="myBidsPage">
  <h3>My Bids</h3>
  <div id="myBidsList"></div>
</div>

<div id="toast" class="toast"></div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

let items = [];
let myBids = {};

const params = new URLSearchParams(window.location.search);
const bidder = params.get("bidder");
const name = params.get("name");

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2000);
}

function goHome(){
  window.location.href = "index.html";
}

/* NAV */
function openMyBids(){
  document.getElementById("items").style.display="none";
  document.getElementById("myBidsPage").style.display="block";
  renderMyBids();
}

/* LOAD */
function loadItems(){
  fetch(SCRIPT_URL + "?items=1")
    .then(r=>r.json())
    .then(data=>{
      items = data;
      render();
    });
}

/* MAIN RENDER */
function render(){
  const el = document.getElementById("items");
  el.innerHTML = "";

  items.forEach(item=>{
    const current = Number(item.current_bid || item.starting_bid || 0);
    const inc = Number(item.bid_increment || 50);
    const next = current + inc;

    let status="";
    if(myBids[item.item_id]){
      if(item.current_winner == bidder){
        status=`<div class="statusWin">Winning</div>`;
      }else{
        status=`<div class="statusLose">Outbid</div>`;
      }
    }

    el.innerHTML += `
      <div class="card">
        <div class="cardLeft">
          <div class="itemName">${item.item_name}</div>
          ${status}
          <div class="price">$${current}</div>

          <button class="bidBtn" onclick="bid('${item.item_id}',${next})">
            Bid $${next}
          </button>

          <div class="customBox">
            <div>Place Custom Bid</div>
            <input id="i_${item.item_id}">
            <button onclick="custom('${item.item_id}')">Submit Bid</button>
          </div>
        </div>

        <div class="cardRight">
          ${item.image ? `<img src="${item.image}">` : ""}
        </div>
      </div>
    `;
  });
}

/* MY BIDS PAGE */
function renderMyBids(){
  const el = document.getElementById("myBidsList");
  el.innerHTML = "";

  Object.keys(myBids).forEach(id=>{
    const item = items.find(i=>i.item_id == id);
    if(!item) return;

    const status = item.current_winner == bidder
      ? `<span class="statusWin">Winning</span>`
      : `<span class="statusLose">Outbid</span>`;

    el.innerHTML += `
      <div class="bidItem">
        <div>${item.item_name}</div>
        <div>Your Bid: $${myBids[id]}</div>
        <div>Current: $${item.current_bid}</div>
        ${status}
      </div>
    `;
  });
}

/* BID */
function bid(id,amount){
  send(id,amount);
}

function custom(id){
  const val = document.getElementById("i_"+id).value;
  send(id,Number(val));
}

function send(id,amount){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:new URLSearchParams({
      bid:1,
      item_id:id,
      bidder_id:bidder,
      bidder_name:name,
      amount:amount
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.success){
      myBids[id]=amount;
      showToast("Bid Submitted");
      loadItems();
    }else{
      showToast("Bid Failed");
    }
  });
}

setInterval(loadItems,4000);
loadItems();

</script>

</body>
</html>
