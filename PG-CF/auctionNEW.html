<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>2026 Pink Gala Auction</title>

<style>
html { font-size: 120%; }

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1c22, #0b0c10);
  margin: 0;
  color: #e6e8ec;
}

  .custom-input-wrap {
  background: #1f222a;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 12px;
  margin: 12px 12px 12px 0;


  display: flex;
  flex-direction: column;
  gap: 10px;
}
.custom-label {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
  color: #cfd3dc;
}

/* HEADER */
h1 {
  text-align: center;
  font-weight: 800;
  font-size: 34px;
  color: #ff4da6;
}

/* ===== TOP BUTTONS (FIXED SIZE) ===== */
.top-actions {
  display: flex;
  gap: 12px;
  margin: 12px;
}

.top-actions button {
  flex: 1;
  padding: 28px;
  font-size: 24px;

  background: linear-gradient(145deg, #3a3f4a, #262a32);
  color: #fff;
  border-radius: 14px;

  border: 1px solid rgba(255,255,255,0.25);
}

/* CARD */
.bid-item {
  margin: 12px;
  border-radius: 20px;
  background: #1e2128;
  padding: 18px;
  position: relative;
}

/* IMAGE */
.item-image {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 10px;
}

/* TITLE */
.item-title {
  font-size: 32px;
  font-weight: 800;
  color: #f1e9d2;
}

  .custom-label {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 12px;

  color: #ffffff;

  background: rgba(255,255,255,0.08);
  padding: 8px 12px;
  border-radius: 8px;

  display: inline-block;
}

/* BID */
.bid-amount {
  font-size: 80px;
  font-weight: 900;
}

/* BUTTON BASE */
button {
  border-radius: 14px;
  cursor: pointer;
}

/* BIG BID BUTTON */
.bid-btn {
  width: 100%;
  padding: 30px;
  font-size: 34px;
  font-weight: bold;
   margin: 0 12px;
  background: linear-gradient(135deg, #5efc82, #38d96b);
  color: #000;

  margin-top: 14px;
}

/* ===== CUSTOM BID BOX (FAT FINGER FIX) ===== */
.custom-bid-box {
  margin-top: 16px;

  background: #2a2d36;
  border-radius: 16px;
}

/* INPUT */
input {
  width: 100%;
  padding: 22px;
  font-size: 30px;
  background: #fff;
  color: #000;
  border-radius: 12px;
  border: none;
  text-align: center;
font-weight: 800;
}

/* SUBMIT */
.custom-bid-box button {
  width: 100%;
  padding: 22px; /* 🔥 bigger */
  font-size: 28px;
  margin: 12px;
  background: #cfd3dc;
  color: #000;
}

/* POPUP */
.bid-popup {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);

  background: linear-gradient(135deg, #5efc82, #38d96b);
  color: #000;

  padding: 40px 60px;
  border-radius: 20px;

  font-size: 40px;
  font-weight: 900;

  text-align: center;

  box-shadow: 0 20px 60px rgba(0,0,0,0.6);

  opacity: 0;
  transition: all 0.25s ease;
  z-index: 9999;
}

.bid-popup.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
  .status-badge {
  position: absolute;
  top: 10px;
  right: 10px;

  padding: 8px 14px;
  border-radius: 10px;

  font-size: 14px;
  font-weight: 800;

  z-index: 2;
}

.status-winning {
  background: #38d96b;
  color: #000;
}

.status-losing {
  background: #ff4d4d;
  color: #fff;
}

</style>
</head>

<body>

<h1>2026 Pink Gala Auction</h1>

<div class="top-actions">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="toggleMyBids()">🎯 My Bids</button>
</div>

<div id="auctionItems"></div>

<div id="bidPopup" class="bid-popup">✅ BID PLACED</div>



<script>
 const params = new URLSearchParams(window.location.search);
const currentBidder = params.get("bidder");
const currentGuest = params.get("name") || "Bidder " + currentBidder;


  let showMyBidsOnly = false;
let currentItems = [];
    let lastDataHash = "";

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjcBzFLO9XFpkWhbTLaRdG4DqpAbrvmnEPc9EwwG6eTwfG73UTQGZD2-U10aeUCV-6/exec";

function sendBid(data) {
  const blob = new Blob(
    [JSON.stringify(data)],
    { type: "application/json" }
  );

  navigator.sendBeacon(SCRIPT_URL, blob);
}
  
let isInteracting = false;
let interactionTimeout;

/* 20s INTERACTION */
function startInteraction(){
  isInteracting = true;
  clearTimeout(interactionTimeout);
  interactionTimeout = setTimeout(()=> isInteracting=false, 20000);
}

function focusBidInput(id){
  const el = document.getElementById(`input-${id}`);
  if(el && document.activeElement !== el){
    el.focus();
    startInteraction();
  }
}

function handleBidEnter(e, id){
  if(e.key === "Enter"){
    placeCustomBid(id);
  }
}

/* POPUP */
function showBidPopup(){
  const popup = document.getElementById("bidPopup");
  popup.classList.add("show");
  setTimeout(()=> popup.classList.remove("show"), 1500);
}

/* RENDER */
function renderItems(items){

  const div = document.getElementById("auctionItems");

  if(!items || items.length === 0){
    div.innerHTML = "Loading...";
    return;
  }

  div.innerHTML = "";

  items.forEach(item=>{

    // ✅ FILTER (My Bids)
   if(showMyBidsOnly){
  const isWinning = String(item.current_winner) === String(currentBidder);

  const hasBid = String(item.last_bidder) === String(currentBidder);

  if(!isWinning && !hasBid){
    return;
  }
}

    const id = item.item_id;
    const bid = item.current_bid || 0;
    const isWinning = String(item.current_winner) === String(currentBidder);
const statusText = isWinning ? "WINNING" : "LOSING";
const statusClass = isWinning ? "status-winning" : "status-losing";

    div.innerHTML += `
      <div class="bid-item">

  <div class="status-badge ${statusClass}">
    ${statusText}
  </div>

        ${item.image ? `<img class="item-image" src="${item.image}">` : ""}

   <div class="item-title">${item.item_name || item.name}</div>

        <div class="bid-amount">$${bid}</div>

        <button class="bid-btn"
          onclick="placeQuickBid('${id}', ${bid+50}, this)">
          Bid $${bid+50}
        </button>

        <div class="custom-bid-box">

          <div class="custom-input-wrap">

            <input
              id="input-${id}"
              inputmode="numeric"
              placeholder="Place Custom Bid"
              onfocus="startInteraction()"
              onclick="event.stopPropagation()"
              onkeydown="handleBidEnter(event, '${id}')"
            >

          </div>

          <button onclick="placeCustomBid('${id}')">
            Submit Bid
          </button>

        </div>

      </div>
    `;
  });
}
/* FETCH */
async function fetchItems(){
  const res = await fetch(`${SCRIPT_URL}?items=true`);
  const data = await res.json();

  const newHash = JSON.stringify(data);

  if(newHash === lastDataHash){
    return;
  }

  lastDataHash = newHash;
  currentItems = data;
renderItems(data);
}

/* QUICK BID */

function placeQuickBid(id, amt, btn){

  btn.disabled = true;

  sendBid({
    action: "placeBid",
    itemId: id,
    bidderId: currentBidder,
    bidderName: currentGuest,
    bidAmount: amt
  });

  btn.disabled = false;

  showBidPopup();
  fetchItems();
}

  
  /* CUSTOM BID */
function placeCustomBid(id){

  const input = document.getElementById(`input-${id}`);
  const val = Number(input.value);

  if(!val){
    alert("Enter a valid bid");
    return;
  }

  sendBid({
    action: "placeBid",
    itemId: id,
    bidderId: currentBidder,
    bidderName: currentGuest,
    bidAmount: val
  });

  input.value = "";

  showBidPopup();
  fetchItems();
}

/* NAV */
function goHome(){ window.location.href="/"; }
function toggleMyBids(){
  showMyBidsOnly = !showMyBidsOnly;
  renderItems(currentItems);
}

/* INIT */
fetchItems();
setInterval(()=>{ if(!isInteracting) fetchItems(); },2000);

</script>

</body>
</html>
