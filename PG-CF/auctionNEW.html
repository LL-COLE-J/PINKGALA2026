<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Auction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f5f6fa, #e4e7ec);
  margin: 0;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

#items {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.item {
  background: white;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.2s ease;
}

.item:hover {
  transform: translateY(-4px);
}

.item h3 {
  margin: 0 0 10px;
  font-weight: 600;
}

.bid {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 12px;
  color: #333;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #ff4d6d, #ff758f);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.9;
}

.status {
  font-size: 12px;
  margin-top: 6px;
  color: #888;
}
</style>
</head>

<body>

<h2>Live Auction</h2>
<div id="items"></div>

<script>
const API = "https://mute-fog-a9af.llcolej8.workers.dev";

let loading = false;

// =========================
// LOAD AUCTION
// =========================
async function loadAuction() {
  if (loading) return;
  loading = true;

  try {
    const res = await fetch(API + "?auction=true");
    const items = await res.json();

    const container = document.getElementById("items");
    if (!container) return;

    container.innerHTML = "";

    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <h3>${item.name}</h3>
        <div class="bid">$${item.currentBid}</div>

        <input 
          type="number" 
          id="bid-${item.itemId}" 
          placeholder="Enter bid"
        />

        <button onclick="placeBid('${item.itemId}')">
          Place Bid
        </button>

        <div class="status" id="status-${item.itemId}"></div>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error("LOAD ERROR:", err);
  }

  loading = false;
}

// =========================
// PLACE BID
// =========================
async function placeBid(itemId) {
  const input = document.getElementById("bid-" + itemId);
  const status = document.getElementById("status-" + itemId);

  const bid = Number(input.value);

  if (!bid) {
    status.textContent = "Enter valid bid";
    return;
  }

  status.textContent = "Submitting...";

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain"
      },
      body: JSON.stringify({
        itemId: itemId,
        bid: bid
      })
    });

    const text = await res.text();

    let result;
    try {
      result = JSON.parse(text);
    } catch {
      console.error("BAD RESPONSE:", text);
      status.textContent = "Server error";
      return;
    }

    if (result.success) {
      status.textContent = "Bid placed!";
      input.value = "";
      loadAuction();
    } else {
      status.textContent = result.message || "Bid failed";
    }

  } catch (err) {
    console.error("BID ERROR:", err);
    status.textContent = "Request failed";
  }
}

// =========================
// START AFTER DOM READY
// =========================
document.addEventListener("DOMContentLoaded", () => {
  loadAuction();
  setInterval(loadAuction, 4000);
});
</script>

</body>
</html>
