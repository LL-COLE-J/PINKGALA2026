<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>2026 Pink Gala Auction</title>

<style>
html { font-size: 120%; }

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1c22, #0b0c10);
  margin: 0;
  color: #e6e8ec;
}

/* HEADER */
h1 {
  text-align: center;
  font-weight: 800;
  font-size: 34px;
  color: #ff4da6;
}

/* ===== TOP BUTTONS (FIXED SIZE) ===== */
.top-actions {
  display: flex;
  gap: 12px;
  margin: 12px;
}

.top-actions button {
  flex: 1;
  padding: 28px;
  font-size: 24px;

  background: linear-gradient(145deg, #3a3f4a, #262a32);
  color: #fff;
  border-radius: 14px;

  border: 1px solid rgba(255,255,255,0.25);
}

/* CARD */
.bid-item {
  margin: 12px;
  border-radius: 20px;
  background: #1e2128;
  padding: 18px;
}

/* IMAGE */
.item-image {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 10px;
}

/* TITLE */
.item-title {
  font-size: 32px;
  font-weight: 800;
  color: #f1e9d2;
}

  .custom-label {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 12px;
  color: #e6e8ec;
}

/* BID */
.bid-amount {
  font-size: 80px;
  font-weight: 900;
}

/* BUTTON BASE */
button {
  border-radius: 14px;
  cursor: pointer;
}

/* BIG BID BUTTON */
.bid-btn {
  width: 100%;
  padding: 30px;
  font-size: 34px;
  font-weight: bold;

  background: linear-gradient(135deg, #5efc82, #38d96b);
  color: #000;

  margin-top: 14px;
}

/* ===== CUSTOM BID BOX (FAT FINGER FIX) ===== */
.custom-bid-box {
  margin-top: 16px;
  padding: 20px; /* 🔥 bigger hit zone */

  background: #2a2d36;
  border-radius: 16px;
}

/* INPUT */
input {
  width: 100%;
  padding: 22px; /* 🔥 bigger */
  font-size: 30px;

  margin-bottom: 14px;

  background: #fff;
  color: #000;

  border-radius: 14px;
}

/* SUBMIT */
.custom-bid-box button {
  width: 100%;
  padding: 22px; /* 🔥 bigger */
  font-size: 28px;

  background: #cfd3dc;
  color: #000;
}

/* POPUP */
.bid-popup {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) scale(0.9);
  background: #38d96b;
  color: #000;
  padding: 18px 28px;
  border-radius: 12px;
  font-size: 22px;
  font-weight: bold;
  opacity: 0;
  transition: all 0.25s ease;
  z-index: 9999;
}

.bid-popup.show {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

</style>
</head>

<body>

<h1>2026 Pink Gala Auction</h1>

<div class="top-actions">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="toggleMyBids()">🎯 My Bids</button>
</div>

<div id="auctionItems">Loading...</div>

<div id="bidPopup" class="bid-popup">Bid Submitted!</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjcBzFLO9XFpkWhbTLaRdG4DqpAbrvmnEPc9EwwG6eTwfG73UTQGZD2-U10aeUCV-6/exec";

let isInteracting = false;
let interactionTimeout;

/* 20s INTERACTION */
function startInteraction(){
  isInteracting = true;
  clearTimeout(interactionTimeout);
  interactionTimeout = setTimeout(()=> isInteracting=false, 20000);
}

function focusBidInput(id){
  const el = document.getElementById(`input-${id}`);
  if(el && document.activeElement !== el){
    el.focus();
    startInteraction();
  }
}

function handleBidEnter(e, id){
  if(e.key === "Enter"){
    placeCustomBid(id);
  }
}

/* POPUP */
function showBidPopup(){
  const popup = document.getElementById("bidPopup");
  popup.classList.add("show");
  setTimeout(()=> popup.classList.remove("show"), 1500);
}

/* RENDER */
function renderItems(items){
  
  const div = document.getElementById("auctionItems");
  div.innerHTML = "";

  items.forEach(item=>{
    const id = item.item_id;
    const bid = item.current_bid || 0;

    div.innerHTML += `
      <div class="bid-item">

        ${item.image ? `<img class="item-image" src="${item.image}">` : ""}

        <div class="item-title">${item.name}</div>

        <div class="bid-amount">$${bid}</div>

        <button class="bid-btn"
          onclick="placeQuickBid('${id}', ${bid+50}, this)">
          Bid $${bid+50}
        </button>

<div class="custom-bid-box">

  <div class="custom-label">Place Custom Bid</div>

  <input
  id="input-${id}"
  inputmode="numeric"
  onfocus="startInteraction()"
  onclick="event.stopPropagation()"
  onkeydown="handleBidEnter(event, '${id}')"
>

          <button onclick="placeCustomBid('${id}')">
            Submit Bid
          </button>

        </div>

      </div>
    `;
  });
}

/* FETCH */
async function fetchItems(){
  const res = await fetch(`${SCRIPT_URL}?items=true`);
  const data = await res.json();
  renderItems(data);
}

/* QUICK BID */
async function placeQuickBid(id, amt, btn){
  btn.disabled = true;

  await fetch(SCRIPT_URL,{
    method:"POST",
    body:new URLSearchParams({
      bid:true,
      item_id:id,
      amount:amt
    })
  });

  btn.disabled=false;
  showBidPopup();
  fetchItems();
}

/* CUSTOM BID */
async function placeCustomBid(id){
  const val = document.getElementById(`input-${id}`).value;

  await fetch(SCRIPT_URL,{
    method:"POST",
    body:new URLSearchParams({
      bid:true,
      item_id:id,
      amount:val
    })
  });

  showBidPopup();
  fetchItems();
}

/* NAV */
function goHome(){ window.location.href="/"; }
function toggleMyBids(){}

/* INIT */
fetchItems();
setInterval(()=>{ if(!isInteracting) fetchItems(); },3000);

</script>

</body>
</html>
