<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>2026 Pink Gala Auction</title>

<style>

/* ===== BASE ===== */
html {
  font-size: 120%;
}

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1c22, #0b0c10);
  margin: 0;
  padding: 0;
  color: #e6e8ec;
}

/* ===== HEADER ===== */
h1 {
  color: #cfd3dc;
  text-align: center;
  letter-spacing: 1px;
  font-weight: 700;
}

/* ===== LAYOUT ===== */
.app-body {
  width: 100%;
  padding: 0 10px 40px 10px;
}

#auctionItems {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

/* ===== CARD ===== */
.bid-item {
  border-radius: 20px;
  padding: 0;
  background: linear-gradient(145deg, #1e2128, #16181d);
  box-shadow:
    0 10px 25px rgba(0,0,0,0.6),
    0 0 0 1px rgba(255,255,255,0.05);

  overflow: hidden;
}

/* ===== WINNING CARD ===== */
.bid-item.winning {
  border: 2px solid #4cd964;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.7),
    0 0 12px rgba(76,217,100,0.4);
}

/* ===== INNER FLEX ===== */
.card-inner {
  display: flex;
  flex-direction: column;
}

/* ===== CARD CONTENT WRAP ===== */
.card-content {
  display: flex;
  gap: 16px;
  padding: 18px;
}

/* ===== IMAGE ===== */
.item-image {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 14px;
  flex-shrink: 0;
  background: #111;
}

/* ===== TEXT AREA ===== */
.card-text {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ===== TITLE ===== */
.item-title {
  font-size: 40px;
  font-weight: 800;
  margin-bottom: 10px;
}

/* ===== BID BOX ===== */
.bid-box {
  background: rgba(255,255,255,0.04);
  padding: 14px;
  border-radius: 14px;
  margin: 10px 0;
}

/* ===== AMOUNT ===== */
.bid-amount {
  font-size: 90px;
  font-weight: 800;
}

/* ===== META ===== */
.bid-meta {
  font-size: 28px;
  opacity: 0.85;
}

.bid-next {
  font-size: 26px;
  color: #9aa3b2;
}

/* ===== BUTTON ===== */
button {
  border: none;
  border-radius: 14px;
  padding: 22px;
  font-size: 30px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
}

/* PRIMARY BID */
.bid-btn {
  background: linear-gradient(135deg, #4cd964, #2ecc71);
  color: #000;
  margin-top: 12px;
}

/* ===== CUSTOM BID ===== */
.custom-bid-box {
  margin-top: 14px;
  padding: 14px;
  border-radius: 16px;
  border: 1px dashed rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.03);
}

.custom-label {
  font-size: 18px;
  margin-bottom: 8px;
  color: #aab2c2;
}

/* ===== INPUT ===== */
input {
  padding: 18px;
  font-size: 26px;
  border-radius: 12px;
  border: 1px solid #444;
  background: #0f1116;
  color: #fff;
  width: 100%;
  text-align: center;
  font-weight: 700;
  margin-bottom: 10px;
}

/* ===== TOP BUTTONS ===== */
.top-actions button {
  background: #1a1c22;
  color: #cfd3dc;
  border: 1px solid rgba(255,255,255,0.08);
}

/* ===== MOBILE ===== */
@media (max-width: 700px) {

  .card-content {
    flex-direction: column;
  }

  .item-image {
    width: 100%;
    height: 220px;
  }

  .bid-amount {
    font-size: 70px;
  }

  .item-title {
    font-size: 32px;
  }
}

</style>
</head>

<body>

<h1>2026 Pink Gala Auction</h1>

<div class="app-body">

<div class="top-actions">

  <button onclick="goHome()">🏠 Home</button>
  <button onclick="toggleMyBids()" id="myBidsBtn">🎯 My Bids</button>

</div>

<div id="auctionPage">

<div style="text-align:center; margin-bottom:20px;">
  <strong id="userInfo"></strong>
</div>

<div id="auctionItems">
  <div class="loading-state">⏳ Loading auction items...</div>
</div>

<script>

/* ===== YOUR JS IS 100% UNTOUCHED ===== */
/* ONLY renderItems HTML changed below */

function renderItems(items) {

  const div = document.getElementById("auctionItems");
  if (!div) return;

  if (!items || items.length === 0) {
    div.innerHTML = "<p>No items available</p>";
    return;
  }

  div.innerHTML = "";

  let filteredItems = items
    .filter(i => i && (i.name || i.ItemName))
    .filter(i => {
      const status = (i.status || "").toLowerCase();
      return status === "open" || status === "";
    });

  if (showMyBidsOnly) {
    filteredItems = filteredItems.filter(i =>
      String(i.current_winner) === String(currentBidder)
    );
  }

  filteredItems
    .sort((a, b) => (parseFloat(b.current_bid) || 0) - (parseFloat(a.current_bid) || 0))
    .forEach(item => {

      const id = item.item_id || item.ItemID;
      const name = item.name || item.ItemName;
      const startingBid = parseFloat(item.starting_bid || item.StartingBid) || 0;
      const currentBidRaw = parseFloat(item.current_bid);

      const effectiveBid = (!isNaN(currentBidRaw) && currentBidRaw > 0)
        ? currentBidRaw
        : startingBid;

      const winner = item.current_winner || "-";
      const image = item.image || "";
      const increment = parseFloat(item.bid_increment) || 50;
      const nextBid = effectiveBid + increment;
      const isWinning = String(item.current_winner) === String(currentBidder);

      const card = document.createElement("div");
      card.className = "bid-item";
      if (isWinning) card.classList.add("winning");

      card.innerHTML = `
<div class="card-inner">

  <div class="card-content">

    ${image ? `
      <img class="item-image" src="${image}" onerror="this.style.display='none';">
    ` : ""}

    <div class="card-text">

      ${isWinning ? `<div style="color:#4cd964; font-weight:bold;">🏆 YOU ARE WINNING</div>` : ""}

      <div class="item-title">${name}</div>

      <div class="bid-box">
        <div class="bid-amount">$${effectiveBid}</div>
        <div class="bid-meta">Leader: ${winner}</div>
        <div class="bid-next">Next: $${nextBid}</div>
      </div>

      <button 
        class="bid-btn"
        onclick="placeQuickBid('${id}', ${nextBid}, this)">
        Bid $${nextBid}
      </button>

      <div class="custom-bid-box" onclick="focusBidInput('${id}')">

        <div class="custom-label">Enter Custom Bid</div>

        <input 
          id="input-${id}" 
          type="text"
          inputmode="numeric"
          onfocus="startInteraction()" 
          oninput="startInteraction()"
          onkeydown="handleBidEnter(event, '${id}', this)">

        <button onclick="placeCustomBid('${id}', this)">
          Submit Bid
        </button>

      </div>

      <div id="status-${id}"></div>

    </div>
  </div>
</div>
      `;

      div.appendChild(card);
    });
}

</script>

</div>
</div>
</body>
</html>
