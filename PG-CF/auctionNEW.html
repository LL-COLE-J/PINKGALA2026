<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>2026 Pink Gala Auction</title>

<style>
html { font-size: 120%; }

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1c22, #0b0c10);
  margin: 0;
  color: #e6e8ec;
}

h1 {
  text-align: center;
  font-weight: 800;
  font-size: 34px;
  color: #ff4da6;
}

/* TOP BUTTONS */
.top-actions {
  display: flex;
  gap: 10px;
  margin: 12px;
}

.top-actions button {
  flex: 1;
  background: linear-gradient(145deg, #3a3f4a, #262a32);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
}

/* CARD */
.bid-item {
  margin: 10px;
  border-radius: 20px;
  background: #1e2128;
  padding: 16px;
}

/* IMAGE */
.item-image {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 10px;
}

/* TITLE */
.item-title {
  font-size: 32px;
  font-weight: 800;
  color: #f1e9d2;
}

/* BID */
.bid-amount {
  font-size: 80px;
  font-weight: 900;
}

button {
  padding: 18px;
  font-size: 26px;
  border-radius: 12px;
}

/* QUICK BID */
.bid-btn {
  background: #5efc82;
  color: #000;
  margin-top: 10px;
}

/* CUSTOM BOX */
.custom-bid-box {
  margin-top: 12px;
  padding: 14px;
  background: #2a2d36;
  border-radius: 14px;
}

/* INPUT FIX (KEYPAD RESTORED) */
input {
  width: 100%;
  padding: 16px;
  font-size: 26px;
  margin-bottom: 10px;
  background: #fff;
  color: #000;
}

/* SUBMIT */
.custom-bid-box button {
  background: #cfd3dc;
  color: #000;
}
</style>
</head>

<body>

<h1>2026 Pink Gala Auction</h1>

<div class="top-actions">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="toggleMyBids()">🎯 My Bids</button>
</div>

<div id="auctionItems">Loading...</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjcBzFLO9XFpkWhbTLaRdG4DqpAbrvmnEPc9EwwG6eTwfG73UTQGZD2-U10aeUCV-6/exec";

let isInteracting = false;
let interactionTimeout;

function startInteraction(){
  isInteracting = true;
  clearTimeout(interactionTimeout);
  interactionTimeout = setTimeout(()=> isInteracting=false, 8000);
}

function focusBidInput(id){
  const el = document.getElementById(`input-${id}`);
  if(el){
    el.focus();
    startInteraction();
  }
}

function handleBidEnter(e, id){
  if(e.key === "Enter"){
    placeCustomBid(id);
  }
}

function renderItems(items){
  const div = document.getElementById("auctionItems");
  div.innerHTML = "";

  items.forEach(item=>{
    const id = item.item_id;
    const bid = item.current_bid || 0;

    div.innerHTML += `
      <div class="bid-item">

        ${item.image ? `<img class="item-image" src="${item.image}">` : ""}

        <div class="item-title">${item.name}</div>

        <div class="bid-amount">$${bid}</div>

        <button class="bid-btn"
          onclick="placeQuickBid('${id}', ${bid+50}, this)">
          Bid $${bid+50}
        </button>

        <div class="custom-bid-box" onclick="focusBidInput('${id}')">

          <input
            id="input-${id}"
            inputmode="numeric"
            onfocus="startInteraction()"
            onkeydown="handleBidEnter(event, '${id}')"
          >

          <button onclick="placeCustomBid('${id}')">
            Submit
          </button>

        </div>

      </div>
    `;
  });
}

async function fetchItems(){
  const res = await fetch(`${SCRIPT_URL}?items=true`);
  const data = await res.json();
  renderItems(data);
}

async function placeQuickBid(id, amt, btn){
  btn.disabled = true;

  await fetch(SCRIPT_URL,{
    method:"POST",
    body:new URLSearchParams({
      bid:true,
      item_id:id,
      amount:amt
    })
  });

  btn.disabled=false;
  fetchItems();
}

async function placeCustomBid(id){
  const val = document.getElementById(`input-${id}`).value;

  await fetch(SCRIPT_URL,{
    method:"POST",
    body:new URLSearchParams({
      bid:true,
      item_id:id,
      amount:val
    })
  });

  fetchItems();
}

function goHome(){
  window.location.href="/";
}

function toggleMyBids(){}

fetchItems();
setInterval(()=>{ if(!isInteracting) fetchItems(); },3000);

</script>

</body>
</html>
