<script>
const API = "https://mute-fog-a9af.llcolej8.workers.dev";

let loading = false;

// LOAD
async function loadAuction() {
  if (loading) return;
  loading = true;

  try {
    const res = await fetch(API + "?auction=true");
    const items = await res.json();

    const container = document.getElementById("items");
    container.innerHTML = "";

    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <h3>${item.name}</h3>
        <p>$${item.currentBid}</p>
        <input type="number" id="bid-${item.itemId}" />
        <button onclick="bid('${item.itemId}')">Bid</button>
      `;

      container.appendChild(div);
    });

  } catch (e) {
    console.error("LOAD FAIL", e);
  }

  loading = false;
}

// BID (GET VERSION — NO JSON ISSUES)
async function bid(id) {
  const val = Number(document.getElementById("bid-" + id).value);
  if (!val) return alert("Enter bid");

  try {
    const res = await fetch(API + "?itemId=" + id + "&bid=" + val);
    const r = await res.json();

    if (!r.success) {
      alert(r.message);
    } else {
      loadAuction();
    }

  } catch (e) {
    console.error("BID FAIL", e);
  }
}

setInterval(loadAuction, 4000);
loadAuction();
</script>
