<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 Pink Gala Auction</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0b0b0b;
  color:#fff;
  margin:0;
  padding:10px;
}

.header{
  text-align:center;
  color:#00ff9c;
  font-size:22px;
  margin-bottom:10px;
}

.topBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  color:#00ff9c;
}

.card{
  background:#111;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
  display:flex;
  gap:10px;
  border:1px solid #00ff9c;
}

.cardLeft{
  flex:1;
}

.cardRight img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}

.itemName{
  font-size:18px;
  font-weight:600;
}

.price{
  font-size:32px;
  margin:5px 0;
}

.bidBtn{
  width:100%;
  padding:12px;
  background:#00ff9c;
  border:none;
  border-radius:8px;
  font-size:18px;
  margin-bottom:8px;
  color:#000;
}

.customBox{
  text-align:center;
}

.customBox input{
  width:90%;
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
}

.customBox button{
  width:90%;
  padding:10px;
}

.statusWin{ color:#00ff9c; }
.statusLose{ color:#ff4d4d; }

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#00ff9c;
  padding:10px 20px;
  border-radius:8px;
  display:none;
  border:1px solid #00ff9c;
}
</style>
</head>

<body>

<div class="header">2026 Pink Gala Auction</div>

<div class="topBar">
  <div onclick="goHome()">🏠 Home</div>
  <div id="myBids">My Bids: 0</div>
</div>

<div id="items"></div>

<div id="toast" class="toast"></div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

let items = [];
let myBids = {};

const params = new URLSearchParams(window.location.search);
const bidder = params.get("bidder");
const name = params.get("name");

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2000);
}

function goHome(){
  window.location.href = "index.html";
}

function loadItems(){
  fetch(SCRIPT_URL + "?items=1")
    .then(r=>r.json())
    .then(data=>{
      items = data;
      render();
      checkOutbid();
    });
}

function render(){
  const el = document.getElementById("items");
  el.innerHTML = "";

  items.forEach(item=>{
    const current = Number(item.current_bid || item.starting_bid || 0);
    const increment = Number(item.bid_increment || 50);
    const nextBid = current + increment;

    const myBid = myBids[item.item_id];
    let status = "";

    if(myBid){
      if(item.current_winner == bidder){
        status = `<div class="statusWin">Winning</div>`;
      }else{
        status = `<div class="statusLose">Outbid</div>`;
      }
    }

    el.innerHTML += `
      <div class="card">

        <div class="cardLeft">
          <div class="itemName">${item.item_name || "Item"}</div>
          ${status}
          <div class="price">$${current}</div>

          <button class="bidBtn" onclick="quickBid('${item.item_id}',${nextBid})">
            Bid $${nextBid}
          </button>

          <div class="customBox">
            <div>Place Custom Bid</div>
            <input id="input_${item.item_id}" placeholder="Enter amount">
            <button onclick="customBid('${item.item_id}')">Submit Bid</button>
          </div>
        </div>

        <div class="cardRight">
          ${item.image ? `<img src="${item.image}">` : ""}
        </div>

      </div>
    `;
  });

  document.getElementById("myBids").innerText =
    "My Bids: " + Object.keys(myBids).length;
}

function quickBid(itemId, amount){
  sendBid(itemId, amount);
}

function customBid(itemId){
  const val = document.getElementById("input_"+itemId).value;
  sendBid(itemId, Number(val));
}

function sendBid(itemId, amount){

  fetch(SCRIPT_URL, {
    method:"POST",
    body:new URLSearchParams({
      bid:1,
      item_id:itemId,
      bidder_id:bidder,
      bidder_name:name,
      amount:amount
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.success){
      myBids[itemId] = amount;
      showToast("Bid Submitted");
      loadItems();
    }else{
      showToast(res.message || "Bid Failed");
    }
  })
  .catch(()=>{
    showToast("Network issue");
  });
}

function checkOutbid(){
  Object.keys(myBids).forEach(id=>{
    const item = items.find(i=>i.item_id == id);
    if(item && item.current_winner != bidder){
      showToast("Outbid on " + item.item_name);
    }
  });
}

// refresh
setInterval(loadItems, 4000);

loadItems();

</script>

</body>
</html>
