<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Auction</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

.item {
  border: 1px solid #ddd;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

button {
  padding: 8px 12px;
  cursor: pointer;
}
</style>

</head>
<body>

<h2>Live Auction</h2>
<div id="items"></div>

<script>
const API = "https://mute-fog-a9af.llcolej8.workers.dev";

let loading = false;

// =========================
// LOAD AUCTION
// =========================
async function loadAuction() {
  if (loading) return;
  loading = true;

  try {
    const res = await fetch(API + "?auction=true");
    const items = await res.json();

    const container = document.getElementById("items");
    container.innerHTML = "";

    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <h3>${item.name}</h3>
        <p><strong>Current Bid:</strong> $${item.currentBid}</p>
        <input type="number" id="bid-${item.itemId}" placeholder="Enter bid"/>
        <button onclick="placeBid('${item.itemId}')">Place Bid</button>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error("LOAD ERROR:", err);
  }

  loading = false;
}

// =========================
// PLACE BID
// =========================
async function placeBid(itemId) {
  const input = document.getElementById("bid-" + itemId);
  const bid = Number(input.value);

  if (!bid) return alert("Enter a valid bid");

  try {
    const res = await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        itemId: itemId,
        bid: bid
      })
    });

    const result = await res.json();

    if (result.success) {
      input.value = "";
      loadAuction();
    } else {
      alert(result.message);
    }

  } catch (err) {
    console.error("BID ERROR:", err);
  }
}

// =========================
// AUTO REFRESH
// =========================
setInterval(loadAuction, 4000);

// INITIAL LOAD
loadAuction();
</script>

</body>
</html>
