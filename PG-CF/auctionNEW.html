<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auction</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #e0e0e0;
  cursor: pointer;
  font-weight: bold;
}

button.primary {
  background: #007bff;
  color: white;
}

.container {
  padding: 12px;
}

.item {
  background: white;
  margin-bottom: 12px;
  padding: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.item h3 {
  margin: 0 0 6px;
}

.bid {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.hidden {
  display: none;
}

</style>
</head>

<body>

<header>
  <button onclick="goHome()">Home</button>
  <button onclick="showMyBids()">My Bids</button>
</header>

<div class="container" id="auctionView"></div>
<div class="container hidden" id="myBidsView"></div>

<script>

const API_URL = "YOUR_API_ENDPOINT";
let USER_ID = new URLSearchParams(window.location.search).get("bidder") || "guest";

async function fetchItems() {
  const res = await fetch(API_URL + "?action=getItems");
  return await res.json();
}

async function fetchMyBids() {
  const res = await fetch(API_URL + `?action=myBids&user=${USER_ID}`);
  return await res.json();
}

async function placeBid(itemId, amount) {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "bid", itemId, amount, user: USER_ID })
  });
  loadAuction();
}

function renderItems(items) {
  const container = document.getElementById("auctionView");
  container.innerHTML = "";

  items.forEach(item => {
    const el = document.createElement("div");
    el.className = "item";

    el.innerHTML = `
      <h3>${item.name}</h3>
      <p>${item.description || ""}</p>
      <div class="bid">
        <span>Current: $${item.currentBid}</span>
        <button onclick="bidPrompt(${item.id}, ${item.currentBid})">Bid</button>
      </div>
    `;

    container.appendChild(el);
  });
}

function renderMyBids(bids) {
  const container = document.getElementById("myBidsView");
  container.innerHTML = '<button onclick="loadAuction()">All Bids</button>';

  bids.forEach(b => {
    const el = document.createElement("div");
    el.className = "item";

    el.innerHTML = `
      <h3>${b.name}</h3>
      <p>Your Bid: $${b.amount}</p>
    `;

    container.appendChild(el);
  });
}

function bidPrompt(itemId, current) {
  const amount = prompt("Enter bid amount", current + 5);
  if (!amount) return;
  placeBid(itemId, Number(amount));
}

async function loadAuction() {
  document.getElementById("auctionView").classList.remove("hidden");
  document.getElementById("myBidsView").classList.add("hidden");

  const items = await fetchItems();
  renderItems(items);
}

async function showMyBids() {
  document.getElementById("auctionView").classList.add("hidden");
  document.getElementById("myBidsView").classList.remove("hidden");

  const bids = await fetchMyBids();
  renderMyBids(bids);
}

function goHome() {
  loadAuction();
}

loadAuction();

</script>

</body>
</html>
