<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>2026 Pink Gala Auction</title>

<style>

html {
  font-size: 120%;
}

/* ===== BACKGROUND (GALA STYLE) ===== */
body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #2a0f1c, #0f0f12);
  margin: 0;
  padding: 0;
  color: #fff;
}

/* ===== HEADER ===== */
h1 {
  color: #ffd700;
  text-align: center;
  letter-spacing: 1px;
}

/* ===== LAYOUT ===== */
#auctionItems {
  display: flex;
  flex-direction: column;
  gap: 32px; /* 🔥 spacing between cards */
  padding: 10px 0;
}

.app-body {
  width: 100%;
  max-width: 100%;
  margin: 0 auto;
  padding: 0 6px 40px 6px;
}

/* ===== CARD ===== */
.bid-item {
  width: 100%;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: space-between;

  border-radius: 18px;
  padding: 22px 18px;

  background: linear-gradient(135deg, #c72c78, #ff6fa3);

  color: white;
  font-size: 20px;

  box-shadow: 
    0 12px 30px rgba(0,0,0,0.6),
    0 0 0 2px rgba(255,215,0,0.15); /* subtle gold edge */

  overflow: hidden;
}

/* ===== WINNING CARD ===== */
.bid-item.winning {
  background: linear-gradient(135deg, #1f7a4d, #28a745);
  color: white;
  box-shadow:
    0 12px 30px rgba(0,0,0,0.7),
    0 0 0 3px rgba(255,215,0,0.4);
}

/* ===== TITLE ===== */
.item-title {
  font-size: 48px;
  font-weight: 800;
  margin: 16px 0 20px 0;
  line-height: 1.2;
}

/* ===== BID BOX ===== */
.bid-box {
  background: rgba(255,255,255,0.15);
  padding: 14px;
  border-radius: 14px;
  margin: 12px 0;

  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ===== AMOUNT ===== */
.bid-amount {
  font-size: 110px;
  font-weight: 800;
  margin-bottom: 10px;
  color: #fff;
}

/* ===== META ===== */
.bid-meta {
  font-size: 32px;
  margin-bottom: 6px;
  opacity: 0.9;
}

.bid-next {
  font-size: 30px;
  color: #ffd700; /* gold highlight */
}

/* ===== BUTTONS ===== */
button {
  background: linear-gradient(135deg, #ffd700, #ffb300);
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 28px;
  font-size: 36px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
  margin-top: 10px;
}

/* ===== CUSTOM BID BOX ===== */
.custom-bid-box {
  margin-top: auto;
  margin-bottom: 14px;
  padding: 14px;
  border-radius: 18px;
  border: 2px dashed rgba(255,215,0,0.4);
  background: rgba(0,0,0,0.25);
}

/* ===== INPUT ===== */
input {
  padding: 20px;
  font-size: 30px;
  border-radius: 14px;
  border: 2px solid #ffd700;
  background: rgba(255,255,255,0.9);
  color: #333;
  width: 100%;
  text-align: center;
  font-weight: 700;
  min-height: 75px;
  box-sizing: border-box;
}

/* ===== TOP BUTTONS ===== */
.top-actions {
  max-width: 420px;
  margin: 0 auto 20px auto;
  padding: 0 10px;
  text-align: center;
}

.top-actions button {
  background: #1f1f1f;
  color: #ffd700;
  border: 1px solid rgba(255,215,0,0.3);
}

/* ===== LOADING ===== */
.loading-state {
  text-align: center;
  font-size: 32px;
  font-weight: 700;
  padding: 80px 20px;
  color: #ffd700;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* ===== MOBILE ===== */
@media (max-width: 430px) {

  body {
    padding: 6px !important;
  }

  .bid-item {
    padding: 18px !important;
  }

}

</style>
</head>

<body>

<h1>2026 Pink Gala Auction</h1>
  <div class="app-body">


<div class="top-actions">

  <button onclick="goHome()" style="display:block; margin:0 auto 10px auto;">
    🏠 Home
  </button>

  <button onclick="toggleMyBids()" id="myBidsBtn" style="display:block; margin:0 auto;">
    🎯 My Bids
  </button>

</div>


<div id="auctionPage">

  <!-- USER BAR (NEW) -->
  <div style="width:100%; margin:0 0 20px 0; text-align:center;">
  <strong id="userInfo"></strong>
</div>

  <!-- AUCTION ITEMS -->
  <div id="auctionItems">
  <div class="loading-state">
  ⏳ Loading auction items...
</div>
</div>


<script>

  function goHome() {
  const params = window.location.search;
  window.location.href = "/index.html" + params;
}

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjcBzFLO9XFpkWhbTLaRdG4DqpAbrvmnEPc9EwwG6eTwfG73UTQGZD2-U10aeUCV-6/exec";

  let interactionTimeout;

console.log("AUCTION VERSION 2");

let currentItems = [];
let isInteracting = false;
let previousWinners = {};
  let showMyBidsOnly = false;

// ===== USER FROM CHECK-IN =====
const params = new URLSearchParams(window.location.search);

const rawName = params.get("name") || "";

const cleanName = decodeURIComponent(rawName).replace(/\+/g, " ");

const user = {
  name: cleanName || "Bidder " + params.get("bidder"),
  bidderId: params.get("bidder"),
  table: params.get("table")
};


function toggleMyBids() {
  showMyBidsOnly = !showMyBidsOnly;

  const btn = document.getElementById("myBidsBtn");
  if (btn) {
    btn.style.background = showMyBidsOnly ? "#28a745" : "#d63384";
  }

  renderItems(currentItems);
setTimeout(autoScaleCards, 50);
}
  

// ===== RENDER ITEMS (FIXED) =====
function renderItems(items) {

  const div = document.getElementById("auctionItems");

  if (!div) return;

  if (!items || items.length === 0) {
    div.innerHTML = "<p>No items available</p>";
    return;
  }

  div.innerHTML = "";

  let filteredItems = items
    .filter(i => i && (i.name || i.ItemName))
    .filter(i => {
      const status = (i.status || "")
        .toString()
        .trim()
        .toLowerCase();
      return status === "open" || status === "";
    });

  // 🎯 MY BIDS FILTER
  if (showMyBidsOnly) {
    filteredItems = filteredItems.filter(i =>
      String(i.current_winner) === String(currentBidder)
    );
  }

  filteredItems
    .sort((a, b) => (parseFloat(b.current_bid) || 0) - (parseFloat(a.current_bid) || 0))
    .forEach(item => {

      const id = item.item_id || item.ItemID;
      const name = item.name || item.ItemName;
     const startingBid = parseFloat(item.starting_bid || item.StartingBid) || 0;
const currentBidRaw = parseFloat(item.current_bid);

const effectiveBid = (!isNaN(currentBidRaw) && currentBidRaw > 0)
  ? currentBidRaw
  : startingBid;
      const winner = item.current_winner || "-";
      const image = item.image || "";

const increment = parseFloat(item.bid_increment) || 50;
const nextBid = effectiveBid + increment;
      const isWinning = String(item.current_winner) === String(currentBidder);

      const card = document.createElement("div");
      card.className = "bid-item";

      if (isWinning) {
        card.classList.add("winning");
      }

      card.innerHTML = `
  <div class="card-inner">

    ${isWinning ? `
      <div style="font-weight:bold; color:#155724; font-size:22px; margin-bottom:12px;">
        🏆 YOU ARE WINNING
      </div>
    ` : ""}

    ${image ? `
      <img src="${image}" 
        onerror="this.style.display='none';"
        style="width:100%; height:220px; object-fit:cover; border-radius:10px; margin-bottom:10px;">
    ` : ""}

    <div class="item-title">
      ${name}
    </div>

    <div class="bid-box">

      <div class="bid-amount">
        $${effectiveBid}
      </div>

      <div class="bid-meta">
        Leader: ${winner}
      </div>

      <div class="bid-next">
        Next Bid: $${nextBid}
      </div>

    </div>

    <button 
      onclick="placeQuickBid('${id}', ${nextBid}, this)"
      style="background:#28a745; font-size:28px; padding:26px; margin-top:16px;"
    >
      Bid $${nextBid}
    </button>

    <div class="custom-bid-box" onclick="focusBidInput('${id}')">

      <div style="font-size:20px; font-weight:700; margin-bottom:8px; color:#d63384;">
        Enter Custom Bid
      </div>

      <input 
        id="input-${id}" 
        type="text" 
        inputmode="numeric"
        placeholder="Custom bid"
        onfocus="startInteraction()" 
        oninput="startInteraction()"
        onkeydown="handleBidEnter(event, '${id}', this)"
      >
      
      <button onclick="placeCustomBid('${id}', this)" 
        style="font-size:28px; padding:18px;">
        Submit Bid
      </button>

    </div>

    <div id="status-${id}" style="margin-top:8px;"></div>

  </div>
  `;

      div.appendChild(card);
    });
}



let currentGuest = user.name;
console.log("CURRENT GUEST VALUE:", currentGuest);
let currentBidder = user.bidderId;
let currentTable = user.table;

async function placeCustomBid(id, btn){

  if (btn.disabled) return;
  btn.disabled = true;

  const statusEl = document.getElementById(`status-${id}`);
  statusEl.innerText = "Submitting...";

  const inputEl = document.getElementById(`input-${id}`);
  const val = Number(inputEl.value);

  if(!val){
    btn.disabled = false;
    return alert("Enter bid");
  }

  let item = currentItems.find(i => i.item_id == id);
  const current = Number(item?.current_bid) || 0;

  if (val <= current) {
    btn.disabled = false;
    return alert(`Bid must be greater than $${current}`);
  }

  try {
console.log("FULL PAYLOAD:", {
  bidder_name: currentGuest,
  bidder_id: currentBidder
});

   const res = await fetch(SCRIPT_URL, {
  method: "POST",
  body: new URLSearchParams({
    bid: true,
    item_id: id,
    bidder_id: currentBidder,
    bidder_name: currentGuest,
    amount: val
  })
});

const result = await res.json();

if (result.success === true) {
  statusEl.innerHTML = "<span style='color:lightgreen;'>Bid placed</span>";
} else {
  statusEl.innerHTML = `<span style='color:red;'>${result.message || "Outbid"}</span>`;
}
    
    inputEl.value = "";

  } catch (err) {
    statusEl.innerText = "⚠️ Error";
    console.error(err);
  }

  btn.disabled = false;
  fetchItems();
}

  function startInteraction() {
  isInteracting = true;

  if (interactionTimeout) {
    clearTimeout(interactionTimeout);
  }

  interactionTimeout = setTimeout(() => {
    isInteracting = false;
  }, 10000);
}

function endInteraction() {
  if (interactionTimeout) {
    clearTimeout(interactionTimeout);
  }

  interactionTimeout = setTimeout(() => {
    isInteracting = false;
  }, 10000);
}

 function autoScaleCards() {
  document.querySelectorAll(".bid-item").forEach(card => {
    const inner = card.querySelector(".card-inner");
    if (!inner) return;

    const prevScale = inner.dataset.scale;

    // reset to measure
   if (!prevScale) {
  inner.style.transform = "scale(1)";
  inner.style.marginTop = "0px";
}

    const cardHeight = card.clientHeight;
    const contentHeight = inner.scrollHeight;

    if (!contentHeight) return;

    const newScale = Math.min(cardHeight / contentHeight, 1.85);

    // 🔥 STOP micro-adjust jitter
    if (prevScale && Math.abs(prevScale - newScale) < 0.02) {
      return;
    }

    inner.style.transform = `scale(${newScale})`;
    inner.style.transformOrigin = "top center";

    inner.style.marginTop = `${(cardHeight - contentHeight * newScale) / 2}px`;

    // store scale
    inner.dataset.scale = newScale;
  });
}

let lastDataHash = "";

// ===== FETCH ITEMS =====
async function fetchItems(){

  const res = await fetch(`${SCRIPT_URL}?items=true`);
  const text = await res.text();
  console.log("RAW:", text);
 if (text === lastDataHash) return;
  let data;
  lastDataHash = text;
  try {
    data = JSON.parse(text);
  } catch (e) {
    console.error("JSON parse failed:", e);
    return;
  }

  console.log("PARSED:", data);

  currentItems = data;
  localStorage.setItem("auctionItems", JSON.stringify(currentItems));
  renderItems(currentItems);
  if (!isInteracting) {
setTimeout(autoScaleCards, 50);

  console.log("FINAL ITEMS:", currentItems);

}
}

  function focusBidInput(id) {
  const el = document.getElementById(`input-${id}`);
  if (el) {
    el.focus();
    el.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}


// ===== BID =====
async function placeQuickBid(id, amt, btn){

  if (btn.disabled) return;

  const statusEl = document.getElementById(`status-${id}`);
  btn.disabled = true;

  statusEl.innerText = "Submitting...";

  try {

    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams({
        bid: true,
        item_id: id,
        bidder_id: currentBidder,
        bidder_name: currentGuest,
        amount: amt
      })
    });

    const result = await res.json();

    if (result.success === true) {
      statusEl.innerHTML = "<span style='color:lightgreen;'>Bid placed</span>";
    } else {
      statusEl.innerHTML = `<span style='color:red;'>${result.message || "Outbid"}</span>`;
    }

  } catch (err) {
    statusEl.innerText = "⚠️ Error";
    console.error(err);
  }

  btn.disabled = false;

  fetchItems();
}

    
  document.addEventListener("DOMContentLoaded", () => {

  // 1. Load cached items instantly
  const cached = localStorage.getItem("auctionItems");
  if (cached) {
    try {
      renderItems(JSON.parse(cached));
    } catch {}
  }

  // 2. Fetch fresh data immediately
  fetchItems();

  // 3. Show user info
  document.getElementById("userInfo").innerText =
    `${user.name} | Bidder #${user.bidderId} | Table ${user.table}`;

  // 4. Auto refresh every 3 seconds
  setInterval(() => {
    if (!isInteracting) {
      fetchItems();
    }
  }, 3000);

});

  function handleBidEnter(e, id, inputEl) {
  if (e.key === "Enter") {
    e.preventDefault();

    // 🔥 CLOSE KEYBOARD
    inputEl.blur();
    document.activeElement.blur();
    
    // find the submit button in the same card
    const card = inputEl.closest(".custom-bid-box");
    const btn = card.querySelector("button");

    if (btn) {
      placeCustomBid(id, btn);
    }
  }
}

</script>
</div>
</body>
</html>
