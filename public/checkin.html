<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check In</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

.container {
  padding: 16px;
}

h1 {
  color: #ff4da6;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #222;
  color: white;
}

.result {
  padding: 12px;
  margin: 6px 0;
  background: #161616;
  border-radius: 10px;
  cursor: pointer;
}

.result:hover {
  background: #2a2a2a;
}
</style>

</head>

<body>

<div class="container">
  <h1>Check In</h1>
  <p>Search your name</p>

  <input id="search" placeholder="Enter your name" oninput="searchGuests()">

  <div id="results"></div>
</div>

<script>
const API = "https://us-central1-pg-auction.cloudfunctions.net/api";

let guests = [];

// LOAD GUESTS
async function loadGuests() {
  const res = await fetch(API + "/guests");
  guests = await res.json();
  renderGuests(guests);

  document.getElementById("loading").style.display = "none";
  document.getElementById("status").innerText = "Start typing name";
}

// SEARCH
function handleSearch(e){
  const term = e.target.value.toLowerCase();
  const container = document.getElementById("guestList");
  container.innerHTML = "";

  const results = guests
    .filter(g => g.name.toLowerCase().includes(term))
    .slice(0, 10);

  results.forEach(g => {
    const div = document.createElement("div");
    div.className = "matchButton";
    div.innerText = g.name;
    div.onclick = () => checkIn(g);
    container.appendChild(div);
  });
}

// CHECK-IN
function checkIn(guest){

  const bidder = guest.bidderNumber || guest.id;

  localStorage.setItem("bidder", bidder);

  document.getElementById("guestList").innerHTML = `
    <div class="tableCard">
      <div class="welcomeName">${guest.name}</div>
      <div class="tableNumber">${guest.table || "-"}</div>
      <div class="bidderNumber">Bidder #${bidder}</div>
      <div style="margin-top:15px;">✅ Checked In</div>
    </div>
  `;

  setTimeout(() => {
    window.location.href = "/auction.html?bidder=" + bidder;
  }, 800);
}

// INIT
window.onload = () => {
  loadGuests();
  document.getElementById("searchInput")
    .addEventListener("input", handleSearch);
};
</script>

</body>
</html>
