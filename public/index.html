<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Check-In</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

.ribbon-img {
  width: 28px;
  max-width: 8vw;
  height: auto;
  display: block;
  margin: 0 auto 6px;
}
  
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px 20px;
  border-bottom: 2px solid #ff2d8d;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  color: #ff2d8d;
  font-size: 20px;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

/* SEARCH */
.search {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  text-align: center;
  font-size: 16px;
  margin-bottom: 15px;
}

/* LIST */
.card {
  background: #111;
  border-radius: 14px;
  padding: 10px;
}

.guest {
  background: #ff2d8d;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 10px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
}

/* MODAL */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* POPUP CARD */
.popup {
  background: #ff2d8d;
  padding: 25px 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 320px;
  text-align: center;
}

.popup h2 {
  margin-bottom: 10px;
}

.info {
  font-size: 16px;
  margin-bottom: 6px;
}

.enter-btn {
  margin-top: 20px;
  padding: 12px 20px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <img src="/ribbon.png" class="ribbon-img">
  <h1>Pink Gala 2026</h1>
</div>

<div class="container">
  <input class="search" placeholder="SEARCH YOUR NAME" oninput="filterGuests(this.value)">
  <div class="card" id="guestList"></div>
</div>

<script src="guests.js"></script>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

// ===== RENDER FILTERED GUESTS =====
function filterGuests(searchText) {
  const guestList = document.getElementById("guestList");
  guestList.innerHTML = "";

  const matches = GUESTS.filter(g =>
    g.name.toLowerCase().includes(searchText.toLowerCase())
  );

  matches.forEach(guest => {
    const div = document.createElement("div");
    div.className = "guest";
    div.textContent = guest.name;

    div.onclick = () => showCheckInPopup(guest);

    guestList.appendChild(div);
  });
}

// ===== POPUP =====
function showCheckInPopup(guest) {
  const overlay = document.createElement("div");
  overlay.className = "overlay";

  overlay.innerHTML = `
    <div class="popup">
      <h2>${guest.name}</h2>
      <div class="info">Tap enter to check in</div>
      <button class="enter-btn">Enter Event</button>
    </div>
  `;

  document.body.appendChild(overlay);

  overlay.querySelector(".enter-btn").onclick = () => {
    completeCheckIn(guest);
  };
}

// ===== CHECK-IN =====
async function completeCheckIn(guest) {

  try {
    await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        type: "checkin",
        userId: guest.id,
        userName: guest.name
      })
    });
  } catch (e) {
    console.log("Check-in backend failed", e);
  }

  // ✅ SESSION
  localStorage.setItem("USER_ID", guest.id);
  localStorage.setItem("USER_NAME", guest.name);

  // ✅ REDIRECT
  window.location.href = "/auction.html";
}
</script>
</body>
</html>
