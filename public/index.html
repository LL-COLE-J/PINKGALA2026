<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Check-In</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 25px 20px;
  border-bottom: 2px solid #ff2d8d;
}

/* Ribbon shape */
.ribbon {
  width: 40px;
  height: 60px;
  margin: 0 auto 10px;
  position: relative;
}

.ribbon::before,
.ribbon::after {
  content: "";
  position: absolute;
  width: 18px;
  height: 50px;
  background: #ff2d8d;
  border-radius: 10px;
}

.ribbon::before {
  left: 0;
  transform: rotate(25deg);
}

.ribbon::after {
  right: 0;
  transform: rotate(-25deg);
}

.header h1 {
  font-family: 'Playfair Display', serif;
  color: #ff2d8d;
  margin: 0;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

/* SEARCH */
.search {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  text-align: center;
  font-size: 16px;
  margin-bottom: 20px;
}

/* LIST */
.card {
  background: #111;
  border-radius: 16px;
  padding: 15px;
}

.guest {
  background: #ff2d8d;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 12px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
}

.guest:hover {
  background: #ff4da6;
}

/* SELECTED CARD (FULL SCREEN FEEL) */
.selected {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ff2d8d;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
  text-align: center;
  padding: 20px;
}

.selected h2 {
  font-size: 26px;
  margin-bottom: 20px;
}

.info {
  font-size: 18px;
  margin-bottom: 10px;
}

.enter-btn {
  margin-top: 30px;
  padding: 16px 30px;
  background: black;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <div class="ribbon"></div>
  <h1>Welcome To The 2026 Pink Gala</h1>
</div>

<div class="container">

  <input class="search" autofocus placeholder="SEARCH YOUR NAME" oninput="filterGuests(this.value)">

  <div class="card" id="guestList"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

let guests = [];

async function loadGuests() {
  const res = await fetch(API + "?action=getGuestsCheckin");
  guests = await res.json();
}

/* RENDER */
function render(list){
  const box = document.getElementById("guestList");
  box.innerHTML = "";

  list.slice(0,15).forEach(g=>{
    if (!g.name) return;

    const div = document.createElement("div");
    div.className = "guest";
    div.innerText = g.name;

    div.onclick = ()=> showCard(g);

    box.appendChild(div);
  });
}

/* SEARCH */
function filterGuests(txt){
  render(
    guests.filter(g =>
      g.name.toLowerCase().includes(txt.toLowerCase())
    )
  );
}

/* SHOW FULL SCREEN CARD */
function showCard(g){

  localStorage.setItem("bidder", g.bidder);
  localStorage.setItem("bidderName", g.name);

  const overlay = document.createElement("div");
  overlay.className = "selected";

  overlay.innerHTML = `
    <h2>${g.name}</h2>
    <div class="info">Table ${g.table || "-"}</div>
    <div class="info">Bidder #${g.bidder}</div>

    <button class="enter-btn" onclick="enterAuction()">Enter Auction</button>
  `;

  document.body.appendChild(overlay);
}

/* ENTER AUCTION */
function enterAuction(){
  window.location.href = "auction.html";
}

loadGuests();

</script>

</body>
</html>
