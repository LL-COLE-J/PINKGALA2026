<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Check-In</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
.ribbon-img {
  width: 28px;
  max-width: 8vw;
  height: auto;
  display: block;
  margin: 0 auto 6px;
}
  
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: white;
}

.header {
  text-align: center;
  padding: 40px 20px 20px;
  border-bottom: 2px solid #ff2d8d;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  color: #ff2d8d;
  font-size: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

.search {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  text-align: center;
  font-size: 16px;
  margin-bottom: 15px;
}

.card {
  background: #111;
  border-radius: 14px;
  padding: 10px;
}

.guest {
  background: #ff2d8d;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 10px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.popup {
  background: #ff2d8d;
  padding: 25px 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 320px;
  text-align: center;
}

.popup h2 {
  margin-bottom: 10px;
}

.info {
  font-size: 16px;
  margin-bottom: 6px;
}

.enter-btn {
  margin-top: 20px;
  padding: 12px 20px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <img src="/ribbon.png" class="ribbon-img">
  <h1>Pink Gala 2026</h1>
</div>

<div class="container">
  <input class="search" placeholder="Start typing your name..." oninput="filterGuests(this.value)">
  <div class="card" id="guestList"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

let guests = [];
let guestsLoaded = false;
let lastSearch = "";

/* LOAD */
async function loadGuests() {
  try {
    const res = await fetch(API + "?action=getGuestsCheckin");
    const text = await res.text();

    if (!text || text.startsWith("<")) {
      throw new Error("Bad response from GAS");
    }

    guests = JSON.parse(text);

    // safety: ensure array
    if (!Array.isArray(guests)) {
      guests = Object.values(guests);
    }

    guestsLoaded = true;

    document.querySelector(".search").placeholder = "SEARCH YOUR NAME";

    // 🔥 auto-run search if user already typed
    if (lastSearch) {
      filterGuests(lastSearch);
    }

  } catch (err) {
    console.error("LOAD FAILED:", err);

    document.getElementById("guestList").innerHTML =
      "<div style='text-align:center;padding:10px;'>Unable to load guests. Refresh.</div>";
  }
}

/* START LOAD */
loadGuests();

/* SEARCH */
function filterGuests(txt){
  lastSearch = txt;

  const box = document.getElementById("guestList");

  if (!guestsLoaded) {
    box.innerHTML = "<div style='text-align:center;padding:10px;'>Loading guests...</div>";
    return;
  }

  if (!txt) {
    box.innerHTML = "";
    return;
  }

  const results = guests.filter(g =>
    (g.name || "").toLowerCase().includes(txt.toLowerCase())
  );

  box.innerHTML = "";

  results.slice(0,15).forEach(g => {
    const div = document.createElement("div");
    div.className = "guest";
    div.innerText = g.name;

    div.onclick = () => showCard(g);

    box.appendChild(div);
  });
}

/* POPUP */
function showCard(g){

  fetch(API, {
    method:"POST",
    body:new URLSearchParams({
      action: "checkin",
      bidder: g.bidder
    })
  });

  const existing = document.querySelector(".overlay");
  if (existing) existing.remove();

  const overlay = document.createElement("div");
  overlay.className = "overlay";

  overlay.innerHTML = `
    <div class="popup">
      <h2>${g.name}</h2>
      <div class="info">Table ${g.table}</div>
      <div class="info">Bidder #${g.bidder}</div>

      <button class="enter-btn" id="enterBtn">
        Enter Starting Bid
      </button>
    </div>
  `;

  overlay.onclick = (e) => {
    if (e.target === overlay) overlay.remove();
  };

  document.body.appendChild(overlay);

  const btn = overlay.querySelector("#enterBtn");
  btn.onclick = () => {
    enterAuction(g.bidder, g.table, g.name);
  };
}

/* REDIRECT */
function enterAuction(bidder, table, name){

  // ✅ FIX: match auction expectations
  localStorage.setItem("USER_ID", bidder);
  localStorage.setItem("USER_NAME", name);

  // (optional safety — keep old keys)
  localStorage.setItem("bidder", bidder);
  localStorage.setItem("table", table);
  localStorage.setItem("name", name);

  window.location.href =
    `auction.html?bidder=${bidder}&table=${table}&name=${encodeURIComponent(name)}`;
}
</script>

</body>
</html>
