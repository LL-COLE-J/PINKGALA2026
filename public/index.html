<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala 2026</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
}

h1 {
  color: #ff4da6;
  margin-bottom: 20px;
}

button {
  display: block;
  width: 200px;
  margin: 10px auto;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  background: #333;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #555;
}
</style>

</head>

<body>

<div class="container">
  <h1>2026 Pink Gala</h1>

  <button onclick="goCheckin()">Check In</button>
  <button onclick="goAuction()">Enter Auction</button>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const bidder = params.get("bidder");

// 👉 If QR already has bidder → skip menu
if (bidder) {
  window.location.href = "/auction.html?bidder=" + bidder;
}

function goCheckin() {
  window.location.href = "/checkin.html";
}

function goAuction() {
  window.location.href = "/auction.html";
}

</script>

</body>
</html>
