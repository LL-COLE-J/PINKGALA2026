<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Check-In</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 25px 20px;
  border-bottom: 2px solid #ff2d8d;
}

.ribbon {
  width: 26px;
  height: 40px;
  margin: 0 auto 10px;
  position: relative;
}

.ribbon::before,
.ribbon::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 34px;
  background: #ff2d8d;
  border-radius: 10px;
}

.ribbon::before {
  left: 0;
  transform: rotate(25deg);
}

.ribbon::after {
  right: 0;
  transform: rotate(-25deg);
}

.header h1 {
  font-family: 'Playfair Display', serif;
  color: #ff2d8d;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

/* SEARCH */
.search {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  text-align: center;
  font-size: 16px;
  margin-bottom: 20px;
}

/* LIST */
.card {
  background: #111;
  border-radius: 16px;
  padding: 15px;
}

.guest {
  background: #ff2d8d;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 12px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
}

/* MODAL BACKGROUND */
.selected {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* POPUP CARD */
.selected-card {
  background: #ff2d8d;
  padding: 30px 25px;
  border-radius: 18px;
  width: 90%;
  max-width: 360px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.selected-card h2 {
  margin-bottom: 15px;
}

.info {
  font-size: 18px;
  margin-bottom: 8px;
}

.enter-btn {
  margin-top: 25px;
  padding: 14px 26px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="ribbon"></div>
  <h1>Welcome To The 2026 Pink Gala</h1>
</div>

<div class="container">
  <input class="search" autofocus placeholder="SEARCH YOUR NAME" oninput="filterGuests(this.value)">
  <div class="card" id="guestList"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

let guests = [];
let selectedGuest = null;

/* LOAD ONLY (NO RENDER) */
async function loadGuests() {
  try {
    const res = await fetch(API + "?action=getGuestsCheckin");
    guests = await res.json();
    console.log("Guests loaded:", guests);
  } catch (e) {
    console.error("Load failed", e);
  }
}

/* RENDER ONLY ON SEARCH */
function render(list){
  const box = document.getElementById("guestList");
  box.innerHTML = "";

  list.slice(0,15).forEach(g=>{
    if (!g.name) return;

    const div = document.createElement("div");
    div.className = "guest";
    div.innerText = g.name;
    div.onclick = () => showCard(g);

    box.appendChild(div);
  });
}

/* SEARCH */
function filterGuests(txt){
  if (!txt) {
    document.getElementById("guestList").innerHTML = "";
    return;
  }

  render(
    guests.filter(g =>
      g.name.toLowerCase().includes(txt.toLowerCase())
    )
  );
}

/* SHOW MODAL ONLY (NO REDIRECT) */
function showCard(g){

  selectedGuest = g;

  const existing = document.querySelector(".selected");
  if (existing) existing.remove();

  const overlay = document.createElement("div");
  overlay.className = "selected";

  overlay.innerHTML = `
  <div class="selected-card">
    <h2>${g.name}</h2>
    <div class="info">Table ${g.table || "N/A"}</div>
    <div class="info">Bidder #${g.bidder || "N/A"}</div>

    <button class="enter-btn"
      onclick="enterAuction(${g.bidder}, ${g.table}, '${g.name.replace(/'/g, "\\'")}')">
      Enter Auction
    </button>
  </div>
`;

  overlay.onclick = (e) => {
    if (e.target === overlay) overlay.remove();
  };

  document.body.appendChild(overlay);
}

function enterAuction(bidder, table, name){

  console.log("CHECKIN DATA:", bidder, table, name);

  fetch(API, {
    method:"POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body:new URLSearchParams({
      action: "checkin",
      bidder: bidder
    })
  })
  .then(res => res.text())
  .then(data => {
    console.log("Check-in response:", data);

    // SAVE
    localStorage.setItem("bidder", bidder);
    localStorage.setItem("table", table);
    localStorage.setItem("name", name);

    // REDIRECT
    window.location.href =
      `auction.html?bidder=${bidder}` +
      `&table=${table}` +
      `&name=${encodeURIComponent(name)}`;
  })
  .catch(err => {
    console.error("Check-in failed:", err);
    alert("Check-in failed. Try again.");
  });
}

/* INIT */
loadGuests();
</script>

</body>
</html>
