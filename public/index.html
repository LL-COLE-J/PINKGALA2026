<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pink Gala Check-In</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: white;
}

.header {
  text-align: center;
  padding: 30px 20px;
  border-bottom: 2px solid #ff2d8d;
}

.ribbon {
  font-size: 42px;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  color: #ff2d8d;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.search {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: #111;
  color: white;
  margin-bottom: 15px;
}

.card {
  background: #111;
  border-radius: 16px;
  padding: 15px;
}

.guest {
  background: #ff2d8d;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  text-align: center;
  cursor: pointer;
}

.guest:hover {
  background: #ff4da6;
}
</style>
</head>

<body>

<div class="header">
  <div class="ribbon">🎀</div>
  <h1>Welcome To The 2026 Pink Gala</h1>
</div>

<div class="container">
  <input class="search" placeholder="Search your name..." oninput="filterGuests(this.value)">
  <div class="card" id="guestList"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

let guests = [];

/* LOAD FROM SHEET */
async function loadGuests() {
  const res = await fetch(API + "?action=getGuestsCheckin");
  guests = await res.json();
  render(guests);
}

/* RENDER LIST */
function render(list){
  const box = document.getElementById("guestList");
  box.innerHTML = "";

  list.slice(0,15).forEach(g=>{
    if (!g.name) return;

    const div = document.createElement("div");
    div.className = "guest";

    div.innerHTML = `
      <strong>${g.name}</strong>
      <div style="font-size:12px;color:#eee">Table ${g.table || ""}</div>
    `;

    div.onclick = ()=>{
      checkIn(g);
    };

    box.appendChild(div);
  });
}

/* SEARCH */
function filterGuests(txt){
  render(
    guests.filter(g =>
      g.name.toLowerCase().includes(txt.toLowerCase())
    )
  );
}

/* CHECK-IN */
function checkIn(g){

  localStorage.setItem("bidder", g.bidder);
  localStorage.setItem("bidderName", g.name);

  // 🔥 WRITE TO SHEET
  fetch(API, {
    method:"POST",
    mode:"no-cors",
    body:new URLSearchParams({
      action:"checkin",
      id:g.id
    })
  });

  // UX feedback
  document.getElementById("guestList").style.display = "none";
  document.querySelector(".search").style.display = "none";

  const msg = document.createElement("div");
  msg.innerHTML = `<h2 style="color:#ff2d8d;">Welcome ${g.name}</h2>`;
  msg.style.textAlign = "center";
  msg.style.marginTop = "30px";

  document.body.appendChild(msg);

  setTimeout(()=>{
    window.location.href = "auction.html";
  }, 1000);
}

/* INIT */
loadGuests();
</script>
</body>
</html>
