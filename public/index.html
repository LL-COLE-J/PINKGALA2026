<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Check-In</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px 20px;
  border-bottom: 2px solid #ff2d8d;
}
.ribbon {
  width: 24px;
  height: 30px;
  margin: 0 auto 6px;
  position: relative;
}

.ribbon::before,
.ribbon::after {
  content: "";
  position: absolute;
  width: 10px;
  height: 30px;
  background: #ff2d8d;
  border-radius: 10px;
  top: 0;
}

.ribbon::before {
  left: 4px;
  transform: rotate(35deg);
}

.ribbon::after {
  right: 4px;
  transform: rotate(-35deg);
}

.header h1 {
  font-family: 'Playfair Display', serif;
  color: #ff2d8d;
  font-size: 20px;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

/* SEARCH */
.search {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  text-align: center;
  font-size: 16px;
  margin-bottom: 15px;
}

/* LIST */
.card {
  background: #111;
  border-radius: 14px;
  padding: 10px;
}

.guest {
  background: #ff2d8d;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 10px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
}

/* MODAL */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* POPUP CARD */
.popup {
  background: #ff2d8d;
  padding: 25px 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 320px;
  text-align: center;
}

.popup h2 {
  margin-bottom: 10px;
}

.info {
  font-size: 16px;
  margin-bottom: 6px;
}

.enter-btn {
  margin-top: 20px;
  padding: 12px 20px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <div class="ribbon"></div>
  <h1>Pink Gala 2026</h1>
</div>

<div class="container">
  <input class="search" placeholder="SEARCH YOUR NAME" oninput="filterGuests(this.value)">
  <div class="card" id="guestList"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

let guests = [];

/* LOAD */
async function loadGuests() {
  const res = await fetch(API + "?action=getGuestsCheckin");
  guests = await res.json();
}

/* SEARCH ONLY */
function filterGuests(txt){
  const box = document.getElementById("guestList");

  if (!txt) {
    box.innerHTML = "";
    return;
  }

  const results = guests.filter(g =>
    g.name.toLowerCase().includes(txt.toLowerCase())
  );

  box.innerHTML = "";

  results.slice(0,15).forEach(g => {
    const div = document.createElement("div");
    div.className = "guest";
    div.innerText = g.name;

    div.onclick = () => showCard(g);

    box.appendChild(div);
  });
}

/* SHOW POPUP */
function showCard(g){

  // 🔥 WRITE CHECK-IN ON NAME CLICK (ONLY CHANGE)
  fetch(API, {
    method:"POST",
    body:new URLSearchParams({
      action: "checkin",
      bidder: g.bidder
    })
  })
  .then(res => res.text())
  .then(data => console.log("CHECKIN (on click):", data))
  .catch(err => console.error("CHECKIN FAILED:", err));

  const existing = document.querySelector(".overlay");
  if (existing) existing.remove();

  const overlay = document.createElement("div");
  overlay.className = "overlay";

  overlay.innerHTML = `
    <div class="popup">
      <h2>${g.name}</h2>
      <div class="info">Table ${g.table}</div>
      <div class="info">Bidder #${g.bidder}</div>

      <button class="enter-btn" id="enterBtn">
        Enter Starting Bid
      </button>
    </div>
  `;

  overlay.onclick = (e) => {
    if (e.target === overlay) overlay.remove();
  };

  document.body.appendChild(overlay);

  const btn = overlay.querySelector("#enterBtn");
  btn.onclick = () => {
    enterAuction(g.bidder, g.table, g.name);
  };
}

/* ENTER AUCTION (NO WRITE HERE ANYMORE) */
function enterAuction(bidder, table, name){

  localStorage.setItem("bidder", bidder);
  localStorage.setItem("table", table);
  localStorage.setItem("name", name);

  window.location.href =
    `auction.html?bidder=${bidder}&table=${table}&name=${encodeURIComponent(name)}`;
}

/* INIT */
loadGuests();
</script>

</body>
</html>
