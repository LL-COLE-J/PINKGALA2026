
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Auction</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

.header {
  text-align: center;
  padding: 18px 12px;
  border-bottom: 2px solid #ff2d8d;
}

.header h1 {
  color: #ff2d8d;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 12px;
}

.item {
  background: #111;
  border: 2px solid #22c55e;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

.title { font-weight: bold; }
.bid { font-size: 28px; color: #22c55e; }
.status { margin-bottom: 10px; }

.desc {
  color: #aaa;
  font-size: 0.85rem;
  margin-top: 10px;
  line-height: 1.3;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 8px;
}

.quick { background: #ff2d8d; color: white; }
.submit { background: #333; color: white; }

.bidBtn:disabled {
  background: #555;
  color: #999;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 8px;
}
</style>
</head>

<body>

<div class="header">
  <h1>2026 Pink Gala Auction</h1>
  <div style="margin-top:10px;">
    <button class="submit" onclick="goHome()">Home</button>
    <button id="myBidsBtn" class="submit" onclick="showMyBids()">My Bids</button>
    <button class="submit" onclick="exportBids()">Export Bids</button>
  </div>
</div>

<div class="container" id="items"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  doc,
  onSnapshot,
  runTransaction,
  serverTimestamp,
  addDoc,
  updateDoc,
  getDocs 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTkto9F50vZZViyv3bY_gSDwh7ZfoMXAs",
  authDomain: "pg-auction.firebaseapp.com",
  projectId: "pg-auction",
  storageBucket: "pg-auction.firebasestorage.app",
  messagingSenderId: "870146780880",
  appId: "1:870146780880:web:9d9c97e9a0ff8340bff8d5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

  // expose for testing
window.db = db;
window.fb = {
  collection,
  doc,
  addDoc,
  updateDoc,
  runTransaction,
  serverTimestamp
};

window.goHome = function() {
  window.location.href = "/";
};
  window.showMyBids = function() {
  alert("My Bids coming soon");
};

function getUser() {
  return {
    id: localStorage.getItem("USER_ID"),
    name: localStorage.getItem("USER_NAME")
  };
}
const userCheck = getUser();

if (!userCheck.id) {
  alert("Please check in first");
  window.location.href = "/";
}

let ITEMS = [];
let SHOWING_MY_BIDS = false;

// ✅ REALTIME LOAD
function loadItems() {
  const itemsRef = collection(db, "items");

  onSnapshot(itemsRef, (snapshot) => {
    ITEMS = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));

    renderAuction(); // 🔥 THIS WAS MISSING
  });
}

// RENDER
function renderAuction() {

  const container = document.getElementById("items");
  container.innerHTML = "";

  ITEMS.forEach(item => {

    const current = item.current_bid || 0;
    const increment = item.bid_increment || 50;
    const nextBid = current + increment;

    const isClosed = (item.status || "").toLowerCase() === "closed";

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="title">${item.item_name}</div>
      <div class="bid">$${current}</div>

      <div class="status">
        ${item.current_winner
          ? `Winning: #${item.current_winner}`
          : 'No bids'}
      </div>

      ${isClosed
        ? `<button class="bidBtn" disabled>Closed</button>`
        : `<button class="quick bidBtn">Bid $${nextBid}</button>`
      }

      <input id="bid-${item.id}" class="customBid" placeholder="Custom bid">
      <button class="submit submitBid">Submit</button>

      <div class="desc">${item["description"] || ''}</div>
    `;

    const bidBtn = div.querySelector(".bidBtn");
    const input = div.querySelector(".customBid");
    const submit = div.querySelector(".submitBid");

    if (!isClosed) {
      bidBtn.onclick = () => submitBid(item.id, nextBid);
    }

    submit.onclick = () => {
      if (isClosed) return;

      const value = Number(input.value);

      if (!value || value < nextBid) {
        alert("Invalid bid");
        return;
      }

      submitBid(item.id, value);
    };

    container.appendChild(div);
  });
}

// ✅ FIRESTORE BID (REPLACES GAS)
async function submitBid(itemId, bidAmount) {

  const user = getUser(); // ✅ get user FIRST
  const bidsRef = collection(db, "bids");

  const bidDocRef = await addDoc(bidsRef, {
    item_id: itemId,
    bidder_id: user.id,
    bidder_name: user.name,
    bid_amount: bidAmount,
    timestamp: serverTimestamp(),
    status: "pending"
  });

  try {

    const itemRef = doc(db, "items", itemId);

    await runTransaction(db, async (transaction) => {

      const itemDoc = await transaction.get(itemRef);

      if (!itemDoc.exists()) throw "Item not found";

      const item = itemDoc.data();
      const current = item.current_bid || 0;

      if (bidAmount <= current) {
        throw "Bid too low";
      }

      transaction.update(itemRef, {
        current_bid: bidAmount,
        current_winner: user.id,
        current_winner_name: user.name,
        last_updated: serverTimestamp()
      });

    });

    await updateDoc(bidDocRef, {
      status: "accepted"
    });

  } catch (e) {

    await updateDoc(bidDocRef, {
      status: "rejected"
    });

    alert(e);
    console.error("Bid failed:", e);
  }
}    

async function exportBids() {
  const snapshot = await getDocs(collection(db, "bids"));

  const rows = [];

  snapshot.forEach(doc => {
    const d = doc.data();

    rows.push({
      itemId: d.item_id || "",
      bidAmount: d.bid_amount || "",
      bidderName: d.bidder_name || "",
      bidderId: d.bidder_id || "",
      status: d.status || "",
      timestamp: d.timestamp?.seconds || ""
    });
  });

  if (rows.length === 0) {
    alert("No bids found.");
    return;
  }

  console.table(rows);

  const headers = Object.keys(rows[0]);
  const csv = [
    headers.join(","),
    ...rows.map(r => headers.map(h => `"${r[h]}"`).join(","))
  ].join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "bids.csv";
  a.click();
}

// 👇 THIS LINE IS CRITICAL (because of module)
window.exportBids = exportBids;
// INIT
loadItems();

</script>
</body>
</html>
