<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Auction</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 18px 12px;
  border-bottom: 2px solid #ff2d8d;
}

.header h1 {
  color: #ff2d8d;
  font-size: 24px;
  margin: 0;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 600px;
  margin: auto;
  padding: 12px;
}

/* ITEM CARD */
.item {
  background: #111;
  border: 2px solid #22c55e;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

/* TITLE */
.title {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 6px;
}

/* BID */
.bid {
  font-size: 34px;
  color: #22c55e;
  margin-bottom: 6px;
}

/* STATUS */
.status {
  margin-bottom: 12px;
  font-size: 14px;
}

.win { color: #22c55e; }
.lose { color: #ef4444; }

/* BUTTONS */
button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

.quick {
  background: #ff2d8d;
  color: white;
  font-weight: bold;
}

.submit {
  background: #333;
  color: white;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

/* MOBILE */
@media (max-width:480px){
  .bid { font-size:28px; }
}
</style>
</head>

<body>

<div class="header">
  <h1>2026 Pink Gala Auction</h1>

  <div style="margin-top:10px;">
    <button class="submit" onclick="goHome()">Home</button>
    <button id="myBidsBtn" class="submit" onclick="showMyBids()">My Bids</button>
  </div>
</div>

<div class="container" id="items"></div>

<script>
function goHome() {
  window.location.href = "/";
}
  
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

// ===== SESSION =====
const USER_ID = localStorage.getItem("USER_ID");
const USER_NAME = localStorage.getItem("USER_NAME");

if (!USER_ID) {
  alert("Please check in first");
  window.location.href = "/";
}

// ===== GLOBALS =====
let ITEMS = [];
let bidQueue = [];
let sending = false;

const itemsEl = document.getElementById("items");

// ===== LOAD ITEMS =====
async function loadItems() {
  const res = await fetch(WEB_APP_URL + "?action=getItems");
  ITEMS = await res.json();

  renderItems();
}

// ===== RENDER =====
function renderItems() {
  itemsEl.innerHTML = "";

  ITEMS.forEach(item => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${item.item_name}</h3>
      <p>Current Bid: $${item.current_bid}</p>
      <button onclick="placeBid('${item.item_id}', '${item.item_name}')">
        Bid +${item.bid_increment || 50}
      </button>
    `;

    itemsEl.appendChild(div);
  });
}

// ===== PLACE BID =====
function placeBid(itemId, itemName) {
  const item = ITEMS.find(i => i.item_id === itemId);

  if (!item) return;

  const increment = item.bid_increment || 50;

  const bid = {
    itemId: itemId,
    itemName: itemName,
    amount: item.current_bid + increment,
    userId: USER_ID,
    userName: USER_NAME,
    time: Date.now()
  };

  queueBid(bid);
}

// ===== QUEUE =====
function queueBid(bid) {
  bidQueue.push(bid);
  processQueue();
}

async function processQueue() {
  if (sending || bidQueue.length === 0) return;

  sending = true;

  const bid = bidQueue.shift();

  try {
    const res = await sendBidToServer(bid);

    if (res.status === "success") {
      // update local UI
      const item = ITEMS.find(i => i.item_id === bid.itemId);
      if (item) {
        item.current_bid = res.newBid;
      }

      renderItems();
    }

  } catch (e) {
    console.error("Retrying...", e);
    bidQueue.unshift(bid);
  }

  sending = false;
  processQueue();
}

// ===== SEND BID =====
async function sendBidToServer(bid) {
  const res = await fetch(WEB_APP_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "bid",
      ...bid
    })
  });

  return await res.json();
}

// ===== INIT =====
loadItems();
</script>

</body>
</html>
