<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Auction</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 18px 12px;
  border-bottom: 2px solid #ff2d8d;
}

.header h1 {
  color: #ff2d8d;
  font-size: 24px;
  margin: 0;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 600px;
  margin: auto;
  padding: 12px;
}

/* ITEM CARD */
.item {
  background: #111;
  border: 2px solid #22c55e;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

/* TITLE */
.title {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 6px;
}

/* BID */
.bid {
  font-size: 34px;
  color: #22c55e;
  margin-bottom: 6px;
}

/* STATUS */
.status {
  margin-bottom: 12px;
  font-size: 14px;
}

.win { color: #22c55e; }
.lose { color: #ef4444; }

/* BUTTONS */
button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

.quick {
  background: #ff2d8d;
  color: white;
  font-weight: bold;
}

.submit {
  background: #333;
  color: white;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

/* MOBILE */
@media (max-width:480px){
  .bid { font-size:28px; }
}

/* 🔥 PINK BID BUTTON (ENHANCED BUT SAME LOOK) */
.bidBtn {
  background: linear-gradient(180deg, #ff2d8d 0%, #e60073 100%);
  color: #fff;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  width: 100%;
  padding: 12px;
  cursor: pointer;

  /* subtle depth */
  box-shadow: 0 4px 10px rgba(255, 45, 141, 0.35);

  /* smooth interaction */
  transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s ease;
}

/* HOVER (desktop only, harmless on mobile) */
.bidBtn:hover {
  background: linear-gradient(180deg, #ff4da6 0%, #ff2d8d 100%);
}

/* TAP / CLICK FEEDBACK */
.bidBtn:active {
  transform: scale(0.97);
  box-shadow: 0 2px 6px rgba(255, 45, 141, 0.25);
}

/* DISABLED STATE (for anti-spam logic) */
.bidBtn:disabled {
  background: #999;
  color: #eee;
  box-shadow: none;
  cursor: not-allowed;
  opacity: 0.7;
}

  /* ITEM LAYOUT (LEFT = INFO, RIGHT = DESCRIPTION) */
.item-row {
  display: flex;
  gap: 12px;
}

/* LEFT SIDE (existing content) */
.item-main {
  flex: 1;
}

/* RIGHT SIDE DESCRIPTION */
.item-desc {
  width: 40%;
  font-size: 13px;
  color: #ccc;
  line-height: 1.4;
  border-left: 1px solid #333;
  padding-left: 10px;
  font-family: 'Playfair Display', serif;
}

/* MOBILE STACK */
@media (max-width: 480px) {
  .item-row {
    flex-direction: column;
  }

  .item-desc {
    width: 100%;
    border-left: none;
    border-top: 1px solid #333;
    padding-left: 0;
    padding-top: 8px;
  }
}

  
</style>
</head>

<body>

<div class="header">
  <h1>2026 Pink Gala Auction</h1>

  <div style="margin-top:10px;">
    <button class="submit" onclick="goHome()">Home</button>
    <button id="myBidsBtn" class="submit" onclick="showMyBids()">My Bids</button>
  </div>
</div>

<div class="container" id="items"></div>
  

<script>

  function goHome() {
  window.location.href = "/";
}
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

const USER_ID = localStorage.getItem("USER_ID");
const USER_NAME = localStorage.getItem("USER_NAME");

if (!USER_ID) {
  alert("Please check in first");
  window.location.href = "/";
}

let ITEMS = [];
let sending = false;

// ===== LOAD ITEMS =====
async function loadItems() {
  const res = await fetch(WEB_APP_URL + "?action=getItems");
  ITEMS = await res.json();

  bindDataToCards();
}

// ===== BIND DATA TO EXISTING UI =====
function bindDataToCards() {
  const container = document.getElementById("items");
  container.innerHTML = "";

  ITEMS.forEach(item => {

    // 🔥 TRUE CURRENT BID LOGIC
    const hasBids = item.current_bid && item.current_bid > 0;
    const current = hasBids ? item.current_bid : item.starting_bid;

    // 🔥 DYNAMIC INCREMENT (ALWAYS FROM SHEET)
    const increment = item.bid_increment || 50;
    const nextBid = current + increment;

    // 🔥 SHOW BIDDER #
    const statusText = item.current_winner
      ? `Winning: #${item.current_winner}`
      : "No bids";

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="item-row">

        <div class="item-main">
          <div class="title">${item.item_name}</div>
          <div class="bid">$${current}</div>
          <div class="status">${statusText}</div>

          <button class="quick bidBtn">Bid $${nextBid}</button>
          <input class="customBid" placeholder="Custom bid" />
          <button class="submit submitBid">Submit</button>
        </div>

        <div class="item-desc">
          ${item.description || ""}
        </div>

      </div>
    `;

    const bidBtn = div.querySelector(".bidBtn");
    const input = div.querySelector(".customBid");
    const submit = div.querySelector(".submitBid");

    // QUICK BID
    bidBtn.onclick = () => placeBid(item, nextBid);

    // CUSTOM BID VALIDATION
    submit.onclick = () => {
      const value = Number(input.value);

      if (!value || isNaN(value)) {
        alert("Enter a valid number");
        return;
      }

      if (value < nextBid) {
        alert(`Minimum bid is $${nextBid}`);
        return;
      }

      placeBid(item, value);
    };

    // HIGHLIGHT CURRENT USER
    if (item.current_winner == USER_ID) {
      div.style.border = "2px solid #00ff88";
    }

    container.appendChild(div);
  });
}

// ===== PLACE BID =====
async function placeBid(item, amount, card) {
  if (sending) return;
  sending = true;

  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        type: "bid",
        itemId: item.item_id,
        itemName: item.item_name,
        amount: amount,
        userId: USER_ID,
        userName: USER_NAME
      })
    });

    const data = await res.json();

    if (data.status === "success") {
      await loadItems(); // refresh UI
    } else {
      alert("Bid failed");
    }

  } catch (e) {
    console.error(e);
    alert("Error placing bid");
  }

  sending = false;
}

// ===== AUTO REFRESH =====
setInterval(loadItems, 3000);

// ===== INIT =====
loadItems();
</script>

</body>
</html>
