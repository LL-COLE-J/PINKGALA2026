<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Auction</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

.header {
  text-align: center;
  padding: 18px 12px;
  border-bottom: 2px solid #ff2d8d;
}

.header h1 {
  color: #ff2d8d;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 12px;
}

.item {
  background: #111;
  border: 2px solid #22c55e;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

.title { font-weight: bold; }
.bid { font-size: 28px; color: #22c55e; }
.status { margin-bottom: 10px; }

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 8px;
}

.quick { background: #ff2d8d; color: white; }
.submit { background: #333; color: white; }

.bidBtn:disabled {
  background: #555;
  color: #999;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 8px;
}
</style>
</head>

<body>

<div class="header">
  <h1>2026 Pink Gala Auction</h1>
  <div style="margin-top:10px;">
    <button class="submit" onclick="goHome()">Home</button>
    <button id="myBidsBtn" class="submit" onclick="showMyBids()">My Bids</button>
  </div>
</div>

<div class="container" id="items"></div>

<script>

function goHome() {
  window.location.href = "/";
}

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

const USER_ID = localStorage.getItem("USER_ID");
const USER_NAME = localStorage.getItem("USER_NAME");

if (!USER_ID) {
  alert("Please check in first");
  window.location.href = "/";
}

let ITEMS = [];
let sending = false;
let SHOWING_MY_BIDS = false;

// =====================
// LOAD ITEMS
// =====================
async function loadItems() {
  const res = await fetch(WEB_APP_URL + "?action=getItems");
  ITEMS = await res.json();

  if (!SHOWING_MY_BIDS) {
    renderAuction();
  }
}

// =====================
// AUCTION VIEW
// =====================
function renderAuction() {

  const container = document.getElementById("items");
  container.innerHTML = "";

  ITEMS.forEach(item => {

    const current = item.current_bid || 0;
    const increment = item.bid_increment || 50;
    const nextBid = current + increment;

    const isClosed = (item.status || "").toString().trim().toLowerCase() === "closed";

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="title">${item.item_name}</div>
      <div class="bid">$${current}</div>

      ${isClosed
        ? `<button class="bidBtn" disabled>Closed</button>`
        : `<button class="quick bidBtn">Bid $${nextBid}</button>`
      }

      <input class="customBid" placeholder="Custom bid">
      <button class="submit submitBid">Submit</button>
    `;

    const bidBtn = div.querySelector(".bidBtn");
    const input = div.querySelector(".customBid");
    const submit = div.querySelector(".submitBid");

    input.addEventListener("input", () => {
      window.lastInputTime = Date.now();
    });

    if (!isClosed) {
      bidBtn.onclick = () => placeBid(item, nextBid);
    }

    submit.onclick = () => {
      if (isClosed) return;

      const value = Number(input.value);

      if (!value || value < nextBid) {
        alert("Invalid bid");
        return;
      }

      placeBid(item, value);
    };

    container.appendChild(div);
  });
}

// =====================
// MY BIDS (REAL VIEW)
// =====================
async function showMyBids() {

  SHOWING_MY_BIDS = true;

  const btn = document.getElementById("myBidsBtn");
  btn.innerText = "Return to All Bids";
  btn.onclick = returnToAuction;

  const res = await fetch(WEB_APP_URL + "?action=getBids");
  const bids = await res.json();

  const myItemIds = new Set(
    bids
      .filter(b => String(b.userId) === String(USER_ID))
      .map(b => String(b.itemId))
  );

  const myItems = ITEMS.filter(item =>
    myItemIds.has(String(item.item_id))
  );

  const container = document.getElementById("items");
  container.innerHTML = "";

  if (myItems.length === 0) {
    container.innerHTML = "<p>No bids yet</p>";
    return;
  }

  myItems.forEach(item => {

    const current = item.current_bid || 0;
    const isWinning = String(item.current_winner) === String(USER_ID);

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="title">${item.item_name}</div>
      <div class="bid">$${current}</div>
      <div class="status">
        ${isWinning
          ? '<span style="color:#00ff88;">WINNING</span>'
          : '<span style="color:#ff4d4d;">LOSING</span>'}
      </div>
    `;

    container.appendChild(div);
  });
}

// =====================
// RETURN
// =====================
function returnToAuction() {
  SHOWING_MY_BIDS = false;

  const btn = document.getElementById("myBidsBtn");
  btn.innerText = "My Bids";
  btn.onclick = showMyBids;

  renderAuction();
}

// =====================
// PLACE BID
// =====================
async function placeBid(item, amount) {

  if (sending) return;
  sending = true;

  await fetch(WEB_APP_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      type: "bid",
      itemId: item.item_id,
      itemName: item.item_name,
      amount,
      userId: USER_ID,
      userName: USER_NAME
    })
  });

  await loadItems();

  sending = false;
}

// =====================
// SMART REFRESH
// =====================
setInterval(() => {
  if (!window.lastInputTime || Date.now() - window.lastInputTime > 15000) {
    loadItems();
  }
}, 5000);

// INIT
loadItems();

</script>

</body>
</html>
