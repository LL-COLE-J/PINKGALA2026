<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Auction</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 18px 12px;
  border-bottom: 2px solid #ff2d8d;
}

.header h1 {
  color: #ff2d8d;
  font-size: 24px;
  margin: 0;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 600px;
  margin: auto;
  padding: 12px;
}

/* ITEM CARD */
.item {
  background: #111;
  border: 2px solid #22c55e;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

/* TITLE */
.title {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 6px;
}

/* BID */
.bid {
  font-size: 34px;
  color: #22c55e;
  margin-bottom: 6px;
}

/* STATUS */
.status {
  margin-bottom: 12px;
  font-size: 14px;
}

.win { color: #22c55e; }
.lose { color: #ef4444; }

/* BUTTONS */
button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

.quick {
  background: #ff2d8d;
  color: white;
  font-weight: bold;
}

.submit {
  background: #333;
  color: white;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

/* MOBILE */
@media (max-width:480px){
  .bid { font-size:28px; }
}
</style>
</head>

<body>

<div class="header">
  <h1>2026 Pink Gala Auction</h1>

  <div style="margin-top:10px;">
    <button class="submit" onclick="goHome()">Home</button>
    <button id="myBidsBtn" class="submit" onclick="showMyBids()">My Bids</button>
  </div>
</div>

<div class="container" id="items"></div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

const USER_ID = localStorage.getItem("USER_ID");
const USER_NAME = localStorage.getItem("USER_NAME");

if (!USER_ID) {
  alert("Please check in first");
  window.location.href = "/";
}

let ITEMS = [];
let sending = false;

// ===== LOAD ITEMS =====
async function loadItems() {
  const res = await fetch(WEB_APP_URL + "?action=getItems");
  ITEMS = await res.json();

  bindDataToCards();
}

// ===== BIND DATA TO EXISTING UI =====
function bindDataToCards() {
  const cards = document.querySelectorAll(".card"); // your existing cards

  cards.forEach((card, index) => {
    const item = ITEMS[index];
    if (!item) return;

    // TITLE
    card.querySelector(".title").innerText = item.item_name;

    // CURRENT BID (or starting)
    const current = item.current_bid || item.starting_bid;
    card.querySelector(".currentBid").innerText = `$${current}`;

    // NO BIDS / WINNER
    const statusEl = card.querySelector(".status");
    if (item.current_winner_name) {
      statusEl.innerText = `Winning: ${item.current_winner_name}`;
    } else {
      statusEl.innerText = "No bids";
    }

    // NEXT BID BUTTON
    const increment = item.bid_increment || 50;
    const nextBid = current + increment;

    const bidBtn = card.querySelector(".bidBtn");
    bidBtn.innerText = `Bid $${nextBid}`;

    // ===== BUTTON CLICK =====
    bidBtn.onclick = () => placeBid(item, nextBid, card);

    // ===== CUSTOM BID =====
    const input = card.querySelector(".customBid");
    const submit = card.querySelector(".submitBid");

    submit.onclick = () => {
      const value = Number(input.value);

      if (!value || isNaN(value)) {
        alert("Enter a valid number");
        return;
      }

      if (value < nextBid) {
        alert(`Bid must be at least $${nextBid}`);
        return;
      }

      placeBid(item, value, card);
    };

    // ===== HIGHLIGHT IF USER WINNING =====
    if (item.current_winner == USER_ID) {
      card.style.border = "2px solid #00ff88";
    }
  });
}

// ===== PLACE BID =====
async function placeBid(item, amount, card) {
  if (sending) return;
  sending = true;

  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        type: "bid",
        itemId: item.item_id,
        itemName: item.item_name,
        amount: amount,
        userId: USER_ID,
        userName: USER_NAME
      })
    });

    const data = await res.json();

    if (data.status === "success") {
      await loadItems(); // refresh UI
    } else {
      alert("Bid failed");
    }

  } catch (e) {
    console.error(e);
    alert("Error placing bid");
  }

  sending = false;
}

// ===== AUTO REFRESH =====
setInterval(loadItems, 3000);

// ===== INIT =====
loadItems();
</script>

</body>
</html>
