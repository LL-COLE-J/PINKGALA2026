
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Auction</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

.header {
  text-align: center;
  padding: 18px 12px;
  border-bottom: 2px solid #ff2d8d;
}

.header h1 {
  color: #ff2d8d;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 12px;
}

.item {
  background: #111;
  border: 2px solid #22c55e;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

.title { font-weight: bold; }
.bid { font-size: 28px; color: #22c55e; }
.status { margin-bottom: 10px; }

.desc {
  color: #aaa;
  font-size: 0.85rem;
  margin-top: 10px;

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 8px;
}

.quick { background: #ff2d8d; color: white; }
.submit { background: #333; color: white; }

.bidBtn:disabled {
  background: #555;
  color: #999;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 8px;

</head>

<body>

<div class="header">
  <h1>2026 Pink Gala Auction</h1>
  <div style="margin-top:10px;">
    <button class="submit" onclick="goHome()">Home</button>
    <button id="myBidsBtn" class="submit" onclick="showMyBids()">My Bids</button>
  </div>
</div>

<div class="container" id="items"></div>

<script>

function goHome() {
  window.location.href = "/";
}

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzFeVWBQvxbh8AvC0HtN3wbcXga31CmbfeYef1opsgkc98omqTSjhaTANB5fw9e3-8N/exec";

const USER_ID = localStorage.getItem("USER_ID");
const USER_NAME = localStorage.getItem("USER_NAME");

if (!USER_ID) {
  alert("Please check in first");
  window.location.href = "/";
}

let lastBidTime = 0;
let ITEMS = [];
let SHOWING_MY_BIDS = false;

let bidQueue = [];
let processingBid = false;

// LOAD ITEMS
async function loadItems() {
  const res = await fetch(WEB_APP_URL + "?action=getItems");

  let data = await res.json();

  // 🔥 FIX
  ITEMS = Array.isArray(data) ? data : Object.values(data);

  if (!SHOWING_MY_BIDS) renderAuction();
}
// RENDER
function renderAuction() {

  const container = document.getElementById("items");
  container.innerHTML = "";

  ITEMS.forEach(item => {

    const current = item.current_bid || 0;
    const increment = item.bid_increment || 50;
    const nextBid = current + increment;

    const isClosed = (item.status || "").toLowerCase() === "closed";

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="title">${item.item_name}</div>
      <div class="bid">$${current}</div>

      <div class="status">
        ${item.current_winner
          ? `Winning: #${item.current_winner}`
          : 'No bids'}
      </div>

      ${isClosed
        ? `<button class="bidBtn" disabled>Closed</button>`
        : `<button class="quick bidBtn">Bid $${nextBid}</button>`
      }

      <input class="customBid" placeholder="Custom bid">
      <button class="submit submitBid">Submit</button>

      <div class="desc">${item["description"] || ''}</div>
    `;

    const bidBtn = div.querySelector(".bidBtn");
    const input = div.querySelector(".customBid");
    const submit = div.querySelector(".submitBid");

    if (!isClosed) {
      bidBtn.onclick = () => queueBid(item, nextBid, bidBtn);
    }

    submit.onclick = () => {
      if (isClosed) return;

      const value = Number(input.value);

      if (!value || value < nextBid) {
        alert("Invalid bid");
        return;
      }

      queueBid(item, value, submit);
    };

    container.appendChild(div);
  });
}

// QUEUE BID
function queueBid(item, amount, buttonEl) {

  const now = Date.now();

  if (now - lastBidTime < 2000) {
    showToast("Please wait before bidding again");
    return;
  }

  lastBidTime = now;

  bidQueue.push({ item, amount, buttonEl });

  showToast("Bid queued...");

  processQueue();
}

  async function sendBid(formData) {

  for (let i = 0; i < 5; i++) {

    try {
      await fetch(WEB_APP_URL, {
        method: "POST",
        body: formData
      });

      // 🔥 ALWAYS WAIT BEFORE ASSUMING SUCCESS
      await new Promise(r => setTimeout(r, 800));

      return true;

    } catch (e) {
      console.log("Retrying...", i);
    }

    // 🔥 ALWAYS BACKOFF (even if no error)
    await new Promise(r => setTimeout(r, 1500 + Math.random() * 1000));
  }

  return false;
}
// PROCESS QUEUE
async function processQueue() {

  if (processingBid) return;
  if (bidQueue.length === 0) return;

  processingBid = true;

  const { item, amount, buttonEl } = bidQueue.shift();

  const parent = buttonEl?.closest(".item");
  const buttons = parent?.querySelectorAll("button");

  // 🔒 disable all buttons
  buttons?.forEach(b => b.disabled = true);

  showToast("Submitting bid...");

  // 🔥 LONGER DELAY
  await new Promise(r => setTimeout(r, 2000 + Math.random() * 2000));

  const formData = new URLSearchParams();
  formData.append("type", "bid");
  formData.append("itemId", item.item_id);
  formData.append("itemName", item.item_name);
  formData.append("amount", amount);
  formData.append("userId", USER_ID);
  formData.append("userName", USER_NAME);

 const success = await sendBid(formData);

if (!success) {
  showToast("Network busy — retrying...");
}

  setTimeout(async () => {

    await loadItems();

    showToast("Bid submitted ✔");

    // 🔓 re-enable AFTER processing + cooldown
    setTimeout(() => {
      buttons?.forEach(b => b.disabled = false);
    }, 2000);

    processingBid = false;
    processQueue();

  }, 1500);
}

// TOAST
function showToast(message) {
  let toast = document.createElement("div");

  toast.innerText = message;

  toast.style.position = "fixed";
  toast.style.bottom = "20px";
  toast.style.left = "50%";
  toast.style.transform = "translateX(-50%)";
  toast.style.background = "#ff2d8d";
  toast.style.color = "white";
  toast.style.padding = "10px 16px";
  toast.style.borderRadius = "10px";
  toast.style.fontSize = "14px";
  toast.style.zIndex = "9999";

  document.body.appendChild(toast);

  setTimeout(() => toast.remove(), 2000);
}

// SLOW REFRESH
setInterval(() => {
  loadItems();
}, 15000);

// INIT
loadItems();

</script>

</body>
</html>
