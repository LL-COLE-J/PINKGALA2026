<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Pink Gala Auction</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
  border-bottom: 2px solid #ff2d8d;
}

.header h1 {
  color: #ff2d8d;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 15px;
}

.item {
  background: #111;
  border: 2px solid #22c55e;
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 18px;
}

.title {
  font-weight: bold;
}

.bid {
  font-size: 34px;
  color: #22c55e;
}

.status {
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

.quick {
  background: #ff2d8d;
  color: white;
}

.submit {
  background: #333;
  color: white;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

/* 🔥 BASE MOBILE IMPROVEMENTS */
.container {
  width: 100%;
  max-width: 600px;
  margin: auto;
  padding: 12px;
}

.item {
  padding: 16px;
  margin-bottom: 14px;
}

/* Make buttons easier to tap */
button {
  min-height: 48px;
  font-size: 16px;
}

/* Inputs bigger */
input {
  font-size: 16px;
  min-height: 48px;
}

/* Prevent overflow issues */
* {
  box-sizing: border-box;
}

  @media (max-width: 480px) {

  .header h1 {
    font-size: 20px;
  }

  .item {
    padding: 14px;
  }

  .title {
    font-size: 16px;
  }

  .bid {
    font-size: 28px;
  }

  .status {
    font-size: 13px;
  }

}

  @media (max-width: 768px) {

  .container {
    padding: 14px;
  }

  .bid {
    font-size: 32px;
  }

}

  
  
</style>
</head>

<body>

<div class="header">
  <h1>Pink Gala Auction</h1>
</div>

<div class="container" id="items"></div>

<script>

let bidder = localStorage.getItem("bidder");

/* MOCK ITEMS */
let ITEMS = [
  {id:1,name:"LV Bag",bid:500,inc:50,bidder:null},
  {id:2,name:"Spa Day",bid:200,inc:20,bidder:null},
  {id:3,name:"Dinner",bid:150,inc:10,bidder:null}
];

function render(){
  const box = document.getElementById("items");
  box.innerHTML = "";

  ITEMS.forEach(i=>{
    const next = i.bid + i.inc;
    const win = i.bidder==bidder;

    const div = document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <div class="title">${i.name}</div>
      <div class="bid">$${i.bid}</div>
      <div class="status">${i.bidder ? (win?"Winning":"Outbid") : "No bids"}</div>

      <button class="quick" onclick="quick(${i.id})">Bid $${next}</button>

      <input id="c-${i.id}" placeholder="Custom bid">

      <button class="submit" onclick="custom(${i.id})">Submit</button>
    `;

    box.appendChild(div);
  });
}

function quick(id){
  let i = ITEMS.find(x=>x.id===id);
  i.bid+=i.inc;
  i.bidder=bidder;
  render();
}

function custom(id){
  let val = Number(document.getElementById("c-"+id).value);
  let i = ITEMS.find(x=>x.id===id);
  if(val>i.bid){
    i.bid=val;
    i.bidder=bidder;
    render();
  }
}

render();

</script>

</body>
</html>
