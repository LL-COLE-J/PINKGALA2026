<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Gala Auction</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* TOP BAR */
.topbar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 12px;
  border-bottom: 2px solid #ff2d8d;
}

.topbar button {
  background: #333;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 10px;
  font-size: 14px;
}

.topbar .center {
  text-align: center;
  color: #ff2d8d;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 600px;
  margin: auto;
  padding: 12px;
}

/* ITEM */
.item {
  background: #111;
  border: 2px solid #22c55e;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

.title {
  font-weight: bold;
  font-size: 18px;
}

.bid {
  font-size: 34px;
  color: #22c55e;
}

.status {
  margin-bottom: 10px;
  font-size: 14px;
}

.win { color: #22c55e; }
.lose { color: #ef4444; }

/* BUTTONS */
button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

.quick {
  background: #ff2d8d;
  color: white;
  font-weight: bold;
}

.submit {
  background: #333;
  color: white;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

/* MOBILE */
@media (max-width:480px){
  .bid { font-size:28px; }
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="goHome()">Home</button>
  <div class="center" id="viewTitle">All Bids</div>
  <button onclick="showMyBids()">My Bids</button>
</div>

<div class="container" id="items"></div>

<script>

let bidder = localStorage.getItem("bidder");

/* MOCK DATA */
let ITEMS = [
  {id:1,name:"LV Bag",bid:500,inc:50,bidder:null},
  {id:2,name:"Spa Day",bid:200,inc:20,bidder:null},
  {id:3,name:"Dinner",bid:150,inc:10,bidder:null}
];

let view = "all"; // all | mine

function render(){

  const box = document.getElementById("items");
  box.innerHTML = "";

  let data = ITEMS;

  if(view === "mine"){
    data = ITEMS.filter(i => i.bidder != null);
  }

  if(view === "mine" && data.length === 0){
    box.innerHTML = `
      <div class="item">
        <div class="title">You have no bids yet</div>
        <button class="submit" onclick="showAll()">All Bids</button>
      </div>
    `;
    return;
  }

  data.forEach(i=>{
    const next = i.bid + i.inc;
    const isWin = i.bidder == bidder;

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="title">${i.name}</div>
      <div class="bid">$${i.bid}</div>

      <div class="status ${isWin ? 'win':'lose'}">
        ${i.bidder ? (isWin ? "Winning" : "Outbid") : "No bids"}
      </div>

      ${view === "all" ? `
        <button class="quick" onclick="quick(${i.id})">
          Bid $${next}
        </button>

        <input id="c-${i.id}" placeholder="Enter custom bid">

        <button class="submit" onclick="custom(${i.id})">
          Submit
        </button>
      ` : `
        <button class="submit" onclick="showAll()">All Bids</button>
      `}
    `;

    box.appendChild(div);
  });
}

/* NAV */
function goHome(){
  window.location.href = "index.html";
}

function showMyBids(){
  view = "mine";
  document.getElementById("viewTitle").innerText = "My Bids";
  render();
}

function showAll(){
  view = "all";
  document.getElementById("viewTitle").innerText = "All Bids";
  render();
}

/* BIDDING (UI ONLY) */
function quick(id){
  let i = ITEMS.find(x=>x.id===id);
  i.bid += i.inc;
  i.bidder = bidder;
  render();
}

function custom(id){
  let val = Number(document.getElementById("c-"+id).value);
  let i = ITEMS.find(x=>x.id===id);

  if(val > i.bid){
    i.bid = val;
    i.bidder = bidder;
    render();
  }
}

render();

</script>

</body>
</html>
